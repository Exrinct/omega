<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega RolePlay — Панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            max-width: 680px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 1rem 1.5rem;
        }

        .user-greeting {
            font-size: 1.2rem;
            font-weight: 500;
        }
        .user-greeting span { color: #3b6e4f; }

        .logout {
            background: none;
            border: 1px solid #3b6e4f;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #ccc;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .logout:hover { background: #3b6e4f20; border-color: #5a8e4a; color: white; }

        .card {
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 1.8rem;
        }

        .create-character {
            display: block;
            text-align: center;
            background: #1e2a1e;
            border: 1px solid #3b6e4f;
            border-radius: 40px;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #c8e6c0;
            text-decoration: none;
            transition: 0.2s;
        }
        .create-character:hover {
            background: #2a3a2a;
            border-color: #5a8e4a;
        }

        .ip-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e1e1e;
            border-radius: 14px;
            padding: 0.8rem 1rem;
            gap: 1rem;
        }
        .ip-text {
            font-family: monospace;
            font-size: 1rem;
        }
        .copy-btn {
            background: none;
            border: 1px solid #3b6e4f;
            color: #3b6e4f;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
        }

        .modpack-link {
            display: inline-block;
            margin-top: 0.8rem;
            color: #3b6e4f;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .modpack-link:hover { border-bottom-color: #3b6e4f; }

        .lore-link {
            display: inline-block;
            background: #1e1e1e;
            border: 1px solid #3b6e4f;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            text-decoration: none;
            color: #c0c0c0;
            transition: 0.2s;
            text-align: center;
        }
        .lore-link:hover { background: #2a2a2a; border-color: #5a8e4a; color: white; }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 0.5rem;
        }
        .social-link {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #333;
            padding: 0.4rem 1rem;
            border-radius: 30px;
        }
        .social-link:hover { border-color: #3b6e4f; color: #ddd; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="user-greeting">Привет, <span id="display-nick">...</span></div>
        <button class="logout" id="logout-btn">Выйти</button>
    </div>

    <a href="character.html" class="create-character">СОЗДАТЬ ПЕРСОНАЖА</a>

    <div class="card">
        <h3 style="margin-bottom: 0.8rem; font-weight: 500;">Адрес сервера</h3>
        <div class="ip-box">
            <span class="ip-text">play.rp-minecraft.ru</span>
            <button class="copy-btn" onclick="copyIP()">Копировать</button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 0.5rem; font-weight: 500;">Сборка модов</h3>
        <p>Скачайте сборку для версии 1.20.1 (Forge)</p>
        <a href="#" class="modpack-link">Скачать ModPack (Google Диск)</a>
    </div>

    <div class="card" style="text-align: center;">
        <a href="lore.html" class="lore-link">Перейти к лору проекта</a>
    </div>

    <div class="social-links">
        <a href="https://discord.gg/hyJUUckQMh" class="social-link" target="_blank">Discord</a>
        <a href="https://t.me/Omega1RolePlay" class="social-link" target="_blank">Telegram</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const displayNick = document.getElementById('display-nick');
    const logoutBtn = document.getElementById('logout-btn');

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        const profileRef = doc(db, "profiles", user.uid);
        const profileSnap = await getDoc(profileRef);
        if (profileSnap.exists()) {
            displayNick.textContent = profileSnap.data().nickname;
        } else {
            displayNick.textContent = "Игрок";
        }
    });

    logoutBtn.addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = 'index.html';
    });

    window.copyIP = function() {
        const ip = document.querySelector('.ip-text').textContent;
        navigator.clipboard.writeText(ip).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Скопировано';
            setTimeout(() => btn.textContent = 'Копировать', 1500);
        });
    };
</script>
</body>
</html>
