<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Omega RolePlay — панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0A0A0A;
            color: #E6E6E6;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.65rem;
            color: #3B6E4F;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
            z-index: 100;
        }
        .status-bar {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 0.5rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1A1A1A;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #2E8B57;
            border-radius: 50%;
        }
        .balance-badge {
            background: #1A1A1A;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #FFD966;
        }
        .status-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .nav-link {
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: #E6E6E6;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
            transition: 0.2s;
            text-decoration: none;
        }
        .nav-link:hover {
            background: #1A1A1A;
        }
        .notif-icon {
            position: relative;
        }
        .notif-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: #3B6E4F;
            color: white;
            font-size: 0.6rem;
            border-radius: 20px;
            padding: 0 0.3rem;
            min-width: 14px;
            text-align: center;
        }
        .notif-dropdown {
            display: none;
            position: absolute;
            top: 32px;
            right: 0;
            width: 260px;
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            z-index: 20;
            max-height: 280px;
            overflow-y: auto;
        }
        .notif-dropdown.show { display: block; }
        .notif-item {
            padding: 0.6rem;
            border-bottom: 1px solid #222;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .notif-item.unread { background: #1A2A1A; }
        .container {
            max-width: 1100px;
            margin: 1.5rem auto;
            padding: 0 1.5rem;
        }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .poll-card {
            background: #1A1A1A;
            border-left: 3px solid #3B6E4F;
        }
        .poll-option {
            display: block;
            margin: 0.5rem 0;
            padding: 0.3rem 0.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
        }
        .poll-option:hover {
            background: #252525;
        }
        .poll-results {
            font-size: 0.75rem;
            color: #A0A0A0;
            margin-top: 0.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.8rem;
        }
        .character-item {
            background: #1A1A1A;
            border-radius: 16px;
            padding: 0.8rem;
            border-left: 3px solid #3B6E4F;
        }
        button {
            background: #3B6E4F;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .copy-btn {
            background: #1A1A1A;
            border: 1px solid #333;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 0.8rem 0;
        }
        .social-links a {
            color: #A0A0A0;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .admin-link {
            text-align: center;
            margin-top: 0.8rem;
        }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index:1000;
        }
        .modal-content {
            background: #111;
            border: 1px solid #222;
            border-radius: 28px;
            padding: 1.5rem;
            max-width: 450px;
            width:90%;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width:100%;
            background: #1A1A1A;
            border:1px solid #333;
            border-radius:14px;
            padding:0.6rem;
            margin:0.5rem 0;
            color:white;
        }
        .modal-buttons {
            display:flex;
            gap:0.8rem;
            margin-top:1rem;
        }
        .modal-buttons button { flex:1; }
        @media (max-width: 680px) {
            .status-bar { flex-direction: column; align-items: stretch; }
            .status-left { justify-content: space-between; }
            .container { padding: 0 1rem; }
        }
    </style>
</head>
<body>
<div class="version">v3.2.0</div>

<div class="status-bar">
    <div class="status-left">
        <div class="online-indicator">
            <span class="online-dot"></span>
            <span id="online-count">0</span> в сети
        </div>
        <div class="balance-badge">
            <span id="user-points">0</span> монет
        </div>
    </div>
    <div class="status-right">
        <a href="shop.html" class="nav-link">Магазин</a>
        <button id="ticket-btn" class="nav-link">Поддержка</button>
        <a href="#" id="my-profile-link" class="nav-link">Профиль</a>
        <div class="notif-icon">
            <button id="notif-icon" class="nav-link">Уведомления</button>
            <span id="notif-badge" class="notif-badge" style="display:none;">0</span>
            <div id="notif-dropdown" class="notif-dropdown"></div>
        </div>
        <button id="logout-btn" class="nav-link">Выход</button>
    </div>
</div>

<div class="container">
    <div id="poll-widget"></div>

    <div class="card">
        <a href="character.html" style="text-decoration: none;"><button id="create-char-btn" style="width:100%;">Создать персонажа</button></a>
    </div>

    <div class="card">
        <h3 style="font-weight:500; margin-bottom:0.6rem;">Мои персонажи</h3>
        <div id="my-characters" class="grid"></div>
        <div id="char-counter" style="font-size:0.75rem; margin-top:0.5rem; color:#888;"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>play.rp-minecraft.ru</span>
            <button id="copy-ip-btn" class="copy-btn">Копировать</button>
        </div>
    </div>

    <div class="card">
        <h3 style="font-weight:500;">Сборка модов</h3>
        <p style="font-size:0.8rem; margin-top:0.2rem;">Forge 1.20.1</p>
        <a href="#" style="color:#3B6E4F; text-decoration:none;">Скачать</a>
    </div>

    <div class="card" style="text-align:center;">
        <a href="lore.html" style="color:#3B6E4F; text-decoration:none;">Лор проекта</a>
    </div>

    <div class="social-links">
        <a href="https://discord.gg/hyJUUckQMh" target="_blank">Discord</a>
        <a href="https://t.me/Omega1RolePlay" target="_blank">Telegram</a>
    </div>
    <div id="admin-link-place" class="admin-link"></div>
</div>

<!-- модалка тикета (осталась) -->
<div id="ticket-modal" class="modal">
    <div class="modal-content">
        <h3>Обращение в поддержку</h3>
        <input type="text" id="ticket-subject" placeholder="Тема">
        <textarea id="ticket-message" rows="4" placeholder="Опишите проблему"></textarea>
        <div class="modal-buttons">
            <button id="submit-ticket">Отправить</button>
            <button id="close-ticket-modal">Отмена</button>
        </div>
        <div id="ticket-error" style="color:#e06c6c;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc, orderBy, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserNick = "";

    const onlineCountSpan = document.getElementById('online-count');
    const userPointsSpan = document.getElementById('user-points');
    const myProfileLink = document.getElementById('my-profile-link');
    const logoutBtn = document.getElementById('logout-btn');
    const ticketBtn = document.getElementById('ticket-btn');
    const ticketModal = document.getElementById('ticket-modal');
    const closeTicket = document.getElementById('close-ticket-modal');
    const submitTicket = document.getElementById('submit-ticket');
    const copyIpBtn = document.getElementById('copy-ip-btn');
    const notifIcon = document.getElementById('notif-icon');
    const notifDropdown = document.getElementById('notif-dropdown');
    const notifBadge = document.getElementById('notif-badge');

    copyIpBtn.addEventListener('click', () => {
        navigator.clipboard.writeText("play.rp-minecraft.ru").then(() => {
            copyIpBtn.textContent = 'Скопировано';
            setTimeout(() => copyIpBtn.textContent = 'Копировать', 1500);
        });
    });

    async function setOnlineStatus(isOnline) {
        if (!currentUser) return;
        await updateDoc(doc(db, "profiles", currentUser.uid), { isOnline, lastSeen: serverTimestamp() }).catch(()=>{});
    }

    function loadOnlineCount() {
        const q = query(collection(db, "profiles"), where("isOnline", "==", true));
        onSnapshot(q, (snap) => {
            onlineCountSpan.innerText = snap.size;
        });
    }

    async function loadBalance() {
        if (!currentUser) return;
        const snap = await getDoc(doc(db, "profiles", currentUser.uid));
        userPointsSpan.innerText = snap.exists() ? (snap.data().rp_points || 0) : 0;
    }

    function loadNotifications() {
        if (!currentUser) return;
        const q = query(collection(db, "notifications"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            let unread = 0;
            notifDropdown.innerHTML = '';
            if (snap.empty) {
                notifDropdown.innerHTML = '<div class="notif-item">Нет уведомлений</div>';
                notifBadge.style.display = 'none';
                return;
            }
            snap.forEach(docSnap => {
                const n = docSnap.data();
                if (!n.isRead) unread++;
                const div = document.createElement('div');
                div.className = `notif-item ${!n.isRead ? 'unread' : ''}`;
                div.innerHTML = `<strong>${n.title}</strong><br>${n.message}`;
                div.addEventListener('click', async () => {
                    if (!n.isRead) await updateDoc(docSnap.ref, { isRead: true });
                });
                notifDropdown.appendChild(div);
            });
            if (unread) {
                notifBadge.style.display = 'block';
                notifBadge.innerText = unread;
            } else {
                notifBadge.style.display = 'none';
            }
        });
    }

    async function loadMyCharacters() {
        if (!currentUser) return;
        const q = query(collection(db, "approved_characters"), where("userId", "==", currentUser.uid));
        const snap = await getDocs(q);
        const container = document.getElementById('my-characters');
        const counter = document.getElementById('char-counter');
        counter.innerText = `Одобрено: ${snap.size} / 3`;
        if (snap.empty) {
            container.innerHTML = '<div class="character-item">Пока нет одобренных персонажей</div>';
            return;
        }
        container.innerHTML = '';
        snap.forEach(docSnap => {
            const c = docSnap.data();
            const div = document.createElement('div');
            div.className = 'character-item';
            div.innerHTML = `<strong>${c.characterName}</strong> (${c.selectedRole || c.profession})<br>${c.age} лет<br><small>${c.history.substring(0,80)}...</small>`;
            container.appendChild(div);
        });
    }

    async function submitTicketFn() {
        const subject = document.getElementById('ticket-subject').value.trim();
        const message = document.getElementById('ticket-message').value.trim();
        const errorDiv = document.getElementById('ticket-error');
        if (!subject || !message) { errorDiv.innerText = 'Заполните поля'; return; }
        await addDoc(collection(db, "tickets"), {
            userId: currentUser.uid, userNick: currentUserNick, subject, message,
            status: 'open', createdAt: serverTimestamp()
        });
        alert('Обращение отправлено');
        ticketModal.style.display = 'none';
    }

    ticketBtn.onclick = () => ticketModal.style.display = 'flex';
    closeTicket.onclick = () => ticketModal.style.display = 'none';
    submitTicket.onclick = submitTicketFn;
    notifIcon.onclick = (e) => { e.stopPropagation(); notifDropdown.classList.toggle('show'); };
    document.addEventListener('click', () => notifDropdown.classList.remove('show'));
    logoutBtn.onclick = async () => { await setOnlineStatus(false); await signOut(auth); window.location.href = 'index.html'; };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        myProfileLink.href = `profile.html?uid=${currentUser.uid}`;
        await setOnlineStatus(true);
        const profileSnap = await getDoc(doc(db, "profiles", user.uid));
        if (profileSnap.exists()) {
            currentUserNick = profileSnap.data().nickname || "Игрок";
            const role = profileSnap.data().role;
            if (role === 'admin' || role === 'reviewer') {
                const adminLink = document.createElement('a');
                adminLink.href = 'admin.html';
                adminLink.textContent = 'Админ-панель';
                adminLink.style.display = 'block';
                adminLink.style.marginTop = '0.8rem';
                adminLink.style.color = '#3B6E4F';
                document.getElementById('admin-link-place').appendChild(adminLink);
            }
        }
        loadOnlineCount();
        loadBalance();
        loadNotifications();
        loadMyCharacters();
        window.addEventListener('beforeunload', () => setOnlineStatus(false));
    });
</script>
</body>
</html>
