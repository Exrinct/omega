<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 2rem;
            position: relative;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            color: #3b6e4f;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 100;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { margin-bottom: 1.5rem; }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #2c2c2c;
            flex-wrap: wrap;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #aaa;
        }
        .tab.active {
            color: #3b6e4f;
            border-bottom: 2px solid #3b6e4f;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .list-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #3b6e4f;
        }
        .actions { margin-top: 0.8rem; display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; }
        button {
            background: #2d5a27;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: white;
            cursor: pointer;
        }
        .delete-btn { background: #5a2e2e; }
        .delete-btn:hover { background: #7a3e3e; }
        .role-select {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0.3rem;
            color: white;
            margin-left: 0.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #3b6e4f;
            text-decoration: none;
        }
        .mass-notif { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
        .mass-notif input, .mass-notif textarea {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0.6rem;
            color: white;
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="version">v1.1.0</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад в панель</a>
    <h1>Админ-панель</h1>
    
    <div class="tabs">
        <div class="tab active" data-tab="pending">Заявки</div>
        <div class="tab" data-tab="approved">Персонажи</div>
        <div class="tab" data-tab="users">Пользователи</div>
        <div class="tab" data-tab="notify">Уведомления</div>
    </div>

    <div id="pending-tab" class="tab-content active">
        <div class="card">
            <h3>Заявки на создание персонажа</h3>
            <div id="pending-list">Загрузка...</div>
        </div>
    </div>

    <div id="approved-tab" class="tab-content">
        <div class="card">
            <h3>Одобренные персонажи (можно удалять)</h3>
            <div id="approved-list">Загрузка...</div>
        </div>
    </div>

    <div id="users-tab" class="tab-content">
        <div class="card">
            <h3>Управление пользователями</h3>
            <div id="users-list">Загрузка...</div>
        </div>
    </div>

    <div id="notify-tab" class="tab-content">
        <div class="card">
            <h3>Массовое уведомление</h3>
            <div class="mass-notif">
                <input type="text" id="notif-title" placeholder="Заголовок">
                <textarea id="notif-message" rows="2" placeholder="Текст уведомления"></textarea>
                <button id="send-mass-notif">Отправить всем</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc, addDoc, deleteDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserRole = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const profileSnap = await getDoc(doc(db, "profiles", user.uid));
        if (!profileSnap.exists()) { window.location.href = 'server.html'; return; }
        currentUserRole = profileSnap.data().role || "user";
        if (currentUserRole !== 'admin' && currentUserRole !== 'reviewer') {
            alert('У вас нет прав');
            window.location.href = 'server.html';
            return;
        }
        loadPending();
        loadApproved();
        loadUsers();
    });

    async function loadPending() {
        const q = query(collection(db, "pending_characters"), where("status", "==", "pending"));
        const snap = await getDocs(q);
        const container = document.getElementById('pending-list');
        if (snap.empty) { container.innerHTML = '<div>Нет заявок</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>Игрок:</strong> ${userNick}</div>
                <div><strong>Персонаж:</strong> ${data.characterName} (${data.profession})</div>
                <div><strong>Пол:</strong> ${data.gender}, <strong>Возраст:</strong> ${data.age}</div>
                <div><strong>История:</strong> ${data.history}</div>
                <div class="actions">
                    <input type="text" id="comment-${docSnap.id}" placeholder="Причина отказа" style="background:#1e1e1e; border:1px solid #333; border-radius:12px; padding:0.3rem;">
                    <button class="approve-btn" data-id="${docSnap.id}">Одобрить</button>
                    <button class="reject-btn" data-id="${docSnap.id}">Отклонить</button>
                </div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', async () => approveCharacter(btn.getAttribute('data-id'))));
        document.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const comment = document.getElementById(`comment-${id}`).value.trim();
            await rejectCharacter(id, comment || 'Не указана причина');
        }));
    }

    async function approveCharacter(pendingId) {
        const pendingRef = doc(db, "pending_characters", pendingId);
        const pendingSnap = await getDoc(pendingRef);
        if (!pendingSnap.exists()) return;
        const data = pendingSnap.data();
        await addDoc(collection(db, "approved_characters"), {
            userId: data.userId, userNick: data.userNick, characterName: data.characterName,
            gender: data.gender, age: data.age, history: data.history, profession: data.profession,
            approvedAt: serverTimestamp(), approvedBy: currentUser.uid
        });
        await addDoc(collection(db, "notifications"), {
            userId: data.userId, title: 'Персонаж одобрен',
            message: `Ваш персонаж "${data.characterName}" одобрен.`, isRead: false, createdAt: serverTimestamp()
        });
        await deleteDoc(pendingRef);
        loadPending();
        loadApproved();
    }

    async function rejectCharacter(pendingId, reason) {
        const pendingRef = doc(db, "pending_characters", pendingId);
        const pendingSnap = await getDoc(pendingRef);
        if (!pendingSnap.exists()) return;
        const data = pendingSnap.data();
        await addDoc(collection(db, "notifications"), {
            userId: data.userId, title: 'Персонаж отклонён',
            message: `Ваш персонаж "${data.characterName}" отклонён. Причина: ${reason}`, isRead: false, createdAt: serverTimestamp()
        });
        await deleteDoc(pendingRef);
        loadPending();
    }

    async function loadApproved() {
        const snap = await getDocs(collection(db, "approved_characters"));
        const container = document.getElementById('approved-list');
        if (snap.empty) { container.innerHTML = '<div>Нет одобренных персонажей</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>Игрок:</strong> ${userNick}</div>
                <div><strong>Персонаж:</strong> ${data.characterName} (${data.profession})</div>
                <div><strong>Пол:</strong> ${data.gender}, <strong>Возраст:</strong> ${data.age}</div>
                <div><strong>История:</strong> ${data.history.substring(0, 100)}...</div>
                <div class="actions">
                    <button class="delete-char-btn" data-id="${docSnap.id}">Удалить персонажа</button>
                </div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.delete-char-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Удалить персонажа?')) {
                    await deleteDoc(doc(db, "approved_characters", btn.getAttribute('data-id')));
                    loadApproved();
                }
            });
        });
    }

    async function loadUsers() {
        const snap = await getDocs(collection(db, "profiles"));
        const container = document.getElementById('users-list');
        if (snap.empty) { container.innerHTML = '<div>Нет пользователей</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const role = data.role || "user";
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>Ник:</strong> ${data.nickname}</div>
                <div><strong>Email:</strong> ${data.email}</div>
                <div><strong>Роль:</strong> 
                    <select class="role-select" data-uid="${docSnap.id}">
                        <option value="user" ${role === 'user' ? 'selected' : ''}>Пользователь</option>
                        <option value="reviewer" ${role === 'reviewer' ? 'selected' : ''}>Анкетолог</option>
                        <option value="admin" ${role === 'admin' ? 'selected' : ''}>Администратор</option>
                    </select>
                </div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.role-select').forEach(select => {
            select.addEventListener('change', async () => {
                if (currentUserRole !== 'admin') { alert('Только админ'); return; }
                const uid = select.getAttribute('data-uid');
                await updateDoc(doc(db, "profiles", uid), { role: select.value });
                alert('Роль обновлена');
            });
        });
    }

    document.getElementById('send-mass-notif').addEventListener('click', async () => {
        if (currentUserRole !== 'admin') { alert('Только администратор'); return; }
        const title = document.getElementById('notif-title').value.trim();
        const message = document.getElementById('notif-message').value.trim();
        if (!title || !message) { alert('Заполните поля'); return; }
        const profiles = await getDocs(collection(db, "profiles"));
        const batch = [];
        profiles.forEach(doc => {
            batch.push(addDoc(collection(db, "notifications"), {
                userId: doc.id, title, message, isRead: false, createdAt: serverTimestamp()
            }));
        });
        await Promise.all(batch);
        alert(`Отправлено ${batch.length} пользователям`);
        document.getElementById('notif-title').value = '';
        document.getElementById('notif-message').value = '';
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(`${tab.getAttribute('data-tab')}-tab`).classList.add('active');
            if (tab.getAttribute('data-tab') === 'approved') loadApproved();
            if (tab.getAttribute('data-tab') === 'users') loadUsers();
        });
    });
</script>
</body>
</html>
