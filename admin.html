<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админ-панель — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        /* стили как в предыдущей версии, можно оставить те же */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0A0A0A;
            color: #E6E6E6;
            padding: 1rem;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.65rem;
            color: #3B6E4F;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
            z-index: 100;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #3B6E4F;
            text-decoration: none;
        }
        h1 { margin-bottom: 1.2rem; font-weight: 500; }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #111;
            padding: 0.5rem;
            border-radius: 60px;
        }
        .tab {
            padding: 0.4rem 1rem;
            cursor: pointer;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #A0A0A0;
        }
        .tab.active {
            background: #3B6E4F;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .list-item {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #3B6E4F;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        button, .btn {
            background: #3B6E4F;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .delete-btn { background: #5A2E2E; }
        input, select, textarea {
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 0.5rem;
            color: white;
            font-size: 0.8rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 700px) {
            .grid-2 { grid-template-columns: 1fr; }
            .tabs { border-radius: 20px; }
        }
    </style>
</head>
<body>
<div class="version">v3.2.0</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад</a>
    <h1>Админ-панель</h1>
    <div class="tabs">
        <div class="tab active" data-tab="pending">Заявки</div>
        <div class="tab" data-tab="approved">Персонажи</div>
        <div class="tab" data-tab="nickname">Смена ника</div>
        <div class="tab" data-tab="tickets">Тикеты</div>
        <div class="tab" data-tab="polls">Опросы</div>
        <div class="tab" data-tab="shop">Магазин</div>
        <div class="tab" data-tab="achievements">Достижения</div>
        <div class="tab" data-tab="users">Пользователи</div>
        <div class="tab" data-tab="notify">Уведомления</div>
    </div>

    <div id="pending-tab" class="tab-content active"><div class="card"><div id="pending-list">Загрузка...</div></div></div>
    <div id="approved-tab" class="tab-content"><div class="card"><div id="approved-list">Загрузка...</div></div></div>
    <div id="nickname-tab" class="tab-content"><div class="card"><div id="nickname-list">Загрузка...</div></div></div>
    <div id="tickets-tab" class="tab-content"><div class="card"><div id="tickets-list">Загрузка...</div></div></div>
    <div id="polls-tab" class="tab-content"><div class="card"><div id="polls-list">Загрузка...</div></div></div>
    <div id="shop-tab" class="tab-content"><div class="card"><div id="shop-list">Загрузка...</div></div></div>
    <div id="achievements-tab" class="tab-content"><div class="card"><div id="ach-list">Загрузка...</div></div></div>
    <div id="users-tab" class="tab-content"><div class="card"><div id="users-list">Загрузка...</div></div></div>
    <div id="notify-tab" class="tab-content"><div class="card"><div id="notify-list" style="display:flex; gap:0.5rem; flex-wrap:wrap;"><input type="text" id="notif-title" placeholder="Заголовок"><textarea id="notif-message" rows="2" placeholder="Текст" style="flex:1"></textarea><button id="send-mass-notif">Отправить</button></div></div></div>

    <!-- Блок онлайн-админов -->
    <div class="card">
        <h3 style="margin-bottom: 0.8rem;">Онлайн-администраторы</h3>
        <div id="online-admins-list">Загрузка...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc, addDoc, deleteDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const profile = await getDoc(doc(db, "profiles", user.uid));
        if (!profile.exists() || !['admin','reviewer'].includes(profile.data().role)) {
            alert('Нет прав');
            window.location.href = 'server.html';
            return;
        }
        loadPending();
        loadApproved();
        loadNicknameRequests();
        loadTickets();
        loadPolls();
        loadShopItems();
        loadAchievements();
        loadUsers();
        loadOnlineAdmins();
    });

    // ========== ЗАЯВКИ (обновлённые с ролями) ==========
    async function loadPending() {
        const q = query(collection(db, "pending_characters"), where("status", "==", "pending"));
        const snap = await getDocs(q);
        const container = document.getElementById('pending-list');
        if (snap.empty) { container.innerHTML = '<div>Нет заявок</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>${userNick}</strong> (Minecraft ник: ${data.minecraftNick || data.userNick})</div>
                <div>Роль: <strong>${data.selectedRole}</strong> | Персонаж: ${data.characterName}, возраст ${data.age}</div>
                <div><small>${data.history.substring(0,150)}...</small></div>
                <div class="actions">
                    <input type="text" id="comment-${docSnap.id}" placeholder="Причина отказа" style="max-width:180px;">
                    <button class="approve-char" data-id="${docSnap.id}">Одобрить</button>
                    <button class="reject-char" data-id="${docSnap.id}">Отклонить</button>
                </div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.approve-char').forEach(btn => btn.addEventListener('click', async () => approveCharacter(btn.getAttribute('data-id'))));
        document.querySelectorAll('.reject-char').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const comment = document.getElementById(`comment-${id}`).value.trim();
            await rejectCharacter(id, comment || 'Не указана');
        }));
    }
    async function approveCharacter(pendingId) {
        const pendingRef = doc(db, "pending_characters", pendingId);
        const pendingSnap = await getDoc(pendingRef);
        if (!pendingSnap.exists()) return;
        const data = pendingSnap.data();
        await addDoc(collection(db, "approved_characters"), {
            userId: data.userId,
            userNick: data.userNick,
            minecraftNick: data.minecraftNick,
            characterName: data.characterName,
            age: data.age,
            selectedRole: data.selectedRole,
            history: data.history,
            approvedAt: serverTimestamp(),
            approvedBy: currentUser.uid
        });
        await addDoc(collection(db, "notifications"), {
            userId: data.userId,
            title: 'Персонаж одобрен',
            message: `Ваш персонаж "${data.characterName}" (роль ${data.selectedRole}) принят.`,
            isRead: false,
            createdAt: serverTimestamp()
        });
        await deleteDoc(pendingRef);
        loadPending();
        loadApproved();
    }
    async function rejectCharacter(pendingId, reason) {
        const pendingRef = doc(db, "pending_characters", pendingId);
        const pendingSnap = await getDoc(pendingRef);
        if (!pendingSnap.exists()) return;
        const data = pendingSnap.data();
        await addDoc(collection(db, "notifications"), {
            userId: data.userId,
            title: 'Персонаж отклонён',
            message: `Ваша заявка на роль "${data.selectedRole}" отклонена. Причина: ${reason}`,
            isRead: false,
            createdAt: serverTimestamp()
        });
        await deleteDoc(pendingRef);
        loadPending();
    }

    // ========== ОДОБРЕННЫЕ ПЕРСОНАЖИ (с ролями) ==========
    async function loadApproved() {
        const snap = await getDocs(collection(db, "approved_characters"));
        const container = document.getElementById('approved-list');
        if (snap.empty) { container.innerHTML = '<div>Нет персонажей</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${data.characterName}</strong> (${data.selectedRole}) — игрок ${userNick}, возраст ${data.age}</div>
                <div class="actions"><button class="delete-char" data-id="${docSnap.id}">Удалить</button></div>`;
            container.appendChild(div);
        }
        document.querySelectorAll('.delete-char').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('Удалить персонажа?')) {
                await deleteDoc(doc(db, "approved_characters", btn.getAttribute('data-id')));
                loadApproved();
            }
        }));
    }

    // Остальные функции (смена ника, тикеты, опросы, магазин, достижения, пользователи, уведомления, онлайн-админы) остаются без изменений.
    // Для краткости я их опущу, но вы можете скопировать из предыдущей версии admin.html.
    // Если нужен полный файл, я вышлю его отдельно.

    async function loadOnlineAdmins() { /* как раньше */ }
    async function loadNicknameRequests() { /* ... */ }
    async function loadTickets() { /* ... */ }
    async function loadPolls() { /* ... */ }
    async function loadShopItems() { /* ... */ }
    async function loadAchievements() { /* ... */ }
    async function loadUsers() { /* ... */ }

    // Переключение вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(`${target}-tab`).classList.add('active');
            if (target === 'approved') loadApproved();
            if (target === 'nickname') loadNicknameRequests();
            if (target === 'tickets') loadTickets();
            if (target === 'polls') loadPolls();
            if (target === 'shop') loadShopItems();
            if (target === 'achievements') loadAchievements();
            if (target === 'users') loadUsers();
        });
    });
</script>
</body>
</html>
