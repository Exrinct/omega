<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админ-панель — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0A0A0A;
            color: #E6E6E6;
            padding: 1rem;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.65rem;
            color: #3B6E4F;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
            z-index: 100;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #3B6E4F;
            text-decoration: none;
        }
        h1 { margin-bottom: 1.2rem; font-weight: 500; }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #111;
            padding: 0.5rem;
            border-radius: 60px;
        }
        .tab {
            padding: 0.4rem 1rem;
            cursor: pointer;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #A0A0A0;
        }
        .tab.active {
            background: #3B6E4F;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .list-item {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #3B6E4F;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        button, .btn {
            background: #3B6E4F;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .delete-btn { background: #5A2E2E; }
        input, select, textarea {
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 0.5rem;
            color: white;
            font-size: 0.8rem;
        }
        @media (max-width: 700px) {
            .tabs { border-radius: 20px; }
        }
    </style>
</head>
<body>
<div class="version">v3.4.1</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад</a>
    <h1>Админ-панель</h1>
    <div class="tabs">
        <div class="tab active" data-tab="pending">Заявки (персонажи)</div>
        <div class="tab" data-tab="approved">Персонажи</div>
        <div class="tab" data-tab="nickname">Смена ника</div>
        <div class="tab" data-tab="tickets">Тикеты</div>
        <div class="tab" data-tab="team">Заявки в команду</div>
        <div class="tab" data-tab="polls">Опросы</div>
        <div class="tab" data-tab="shop">Магазин</div>
        <div class="tab" data-tab="achievements">Достижения</div>
        <div class="tab" data-tab="users">Пользователи</div>
        <div class="tab" data-tab="notify">Уведомления</div>
    </div>

    <div id="pending-tab" class="tab-content active"><div class="card"><div id="pending-list">Загрузка...</div></div></div>
    <div id="approved-tab" class="tab-content"><div class="card"><div id="approved-list">Загрузка...</div></div></div>
    <div id="nickname-tab" class="tab-content"><div class="card"><div id="nickname-list">Загрузка...</div></div></div>
    <div id="tickets-tab" class="tab-content"><div class="card"><div id="tickets-list">Загрузка...</div></div></div>
    <div id="team-tab" class="tab-content"><div class="card"><div id="team-list">Загрузка...</div></div></div>
    <div id="polls-tab" class="tab-content"><div class="card"><button id="new-poll-btn" class="btn">Создать опрос</button><div id="polls-list">Загрузка...</div></div></div>
    <div id="shop-tab" class="tab-content"><div class="card"><button id="new-item-btn" class="btn">Добавить товар</button><div id="shop-list">Загрузка...</div><hr style="margin:1rem 0"><div style="display:flex; gap:1rem; flex-wrap:wrap;"><input type="text" id="give-points-nick" placeholder="Ник"><input type="number" id="give-points-amount" placeholder="Кол-во"><button id="give-points-btn">Выдать монеты</button><button id="remove-points-btn">Списать</button></div></div></div>
    <div id="achievements-tab" class="tab-content"><div class="card"><button id="new-ach-btn" class="btn">+ Достижение</button><hr style="margin:1rem 0"><h3>Выдать достижение</h3><div style="display:flex; gap:0.5rem; flex-wrap:wrap;"><input type="text" id="give-nick" placeholder="Ник"><select id="give-ach-select"></select><button id="give-ach-btn">Выдать</button></div><div id="ach-list">Загрузка...</div></div></div>
    <div id="users-tab" class="tab-content"><div class="card"><div id="users-list">Загрузка...</div></div></div>
    <div id="notify-tab" class="tab-content"><div class="card"><h3>Массовое уведомление</h3><div style="display:flex; gap:0.5rem; flex-wrap:wrap;"><input type="text" id="notif-title" placeholder="Заголовок"><textarea id="notif-message" rows="2" placeholder="Текст" style="flex:1"></textarea><button id="send-mass-notif">Отправить</button></div></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc, addDoc, deleteDoc, serverTimestamp, getDoc, increment, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const profile = await getDoc(doc(db, "profiles", user.uid));
        if (!profile.exists() || !['admin','reviewer'].includes(profile.data().role)) {
            alert('Нет прав');
            window.location.href = 'server.html';
            return;
        }
        loadPending();
        loadApproved();
        loadNicknameRequests();
        loadTickets();
        loadTeamApplications();
        loadPolls();
        loadShopItems();
        loadAchievements();
        loadUsers();
    });

    // === Заявки на персонажа (как раньше) ===
    async function loadPending() { /* ... полная версия из предыдущего admin.html, не меняется */ }
    async function approveCharacter(pendingId) { /* ... */ }
    async function rejectCharacter(pendingId, reason) { /* ... */ }
    async function loadApproved() { /* ... */ }
    async function loadNicknameRequests() { /* ... */ }
    async function loadTickets() { /* ... */ }

    // === НОВАЯ: ЗАЯВКИ В КОМАНДУ ===
    async function loadTeamApplications() {
        const q = query(collection(db, "team_applications"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const container = document.getElementById('team-list');
        if (snap.empty) {
            container.innerHTML = '<div>Нет заявок в команду</div>';
            return;
        }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>${userNick}</strong> (Discord: ${data.discord})</div>
                <div>Имя: ${data.realName}, возраст: ${data.age}</div>
                <div><strong>Навыки:</strong> ${data.skills.substring(0,200)}</div>
                <div><strong>Мотивация:</strong> ${data.motivation.substring(0,200)}</div>
                <div class="actions">
                    <button class="review-team" data-id="${docSnap.id}" data-userid="${data.userId}" data-discord="${data.discord}">Отметить как просмотрено</button>
                    <button class="delete-team" data-id="${docSnap.id}">Удалить заявку</button>
                </div>
            `;
            container.appendChild(div);
        }
        // Обработчики (просто удаление или отметка, можно расширить)
        document.querySelectorAll('.review-team').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                const discord = btn.getAttribute('data-discord');
                // Можно отправить уведомление в Discord или пометить как прочитанное
                alert(`Свяжитесь с ${discord} в Discord.`);
                await deleteDoc(doc(db, "team_applications", id));
                loadTeamApplications();
            });
        });
        document.querySelectorAll('.delete-team').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Удалить заявку?')) {
                    await deleteDoc(doc(db, "team_applications", btn.getAttribute('data-id')));
                    loadTeamApplications();
                }
            });
        });
    }

    // === Остальные функции (опросы, магазин, достижения, пользователи, уведомления) остаются без изменений, их нужно скопировать из предыдущей версии admin.html ===
    // Для краткости я их не дублирую, но они должны быть. Если нужно, я пришлю полный файл.

    // Переключение вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(`${target}-tab`).classList.add('active');
            if (target === 'approved') loadApproved();
            if (target === 'nickname') loadNicknameRequests();
            if (target === 'tickets') loadTickets();
            if (target === 'team') loadTeamApplications();
            if (target === 'polls') loadPolls();
            if (target === 'shop') loadShopItems();
            if (target === 'achievements') loadAchievements();
            if (target === 'users') loadUsers();
        });
    });
</script>
</body>
</html>
