<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 2rem;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            color: #3b6e4f;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 100;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 1.5rem; font-size: 1.8rem; }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #3b6e4f;
            text-decoration: none;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            background: #121212;
            padding: 0.5rem;
            border-radius: 40px;
        }
        .tab {
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            color: #aaa;
            border-radius: 30px;
            transition: 0.2s;
        }
        .tab.active {
            background: #2d5a27;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #3b6e4f;
        }
        .list-item {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #3b6e4f;
        }
        .actions { margin-top: 0.8rem; display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; }
        button, .btn {
            background: #2d5a27;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .delete-btn { background: #5a2e2e; }
        .delete-btn:hover { background: #7a3e3e; }
        input, select, textarea {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 0.4rem 0.6rem;
            color: white;
            font-size: 0.8rem;
        }
        .status-badge {
            display: inline-block;
            background: #2d5a27;
            border-radius: 20px;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;
        }
        .status-closed { background: #5a2e2e; }
    </style>
</head>
<body>
<div class="version">v2.2.2</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад в панель</a>
    <h1>Админ-панель</h1>
    <div class="tabs">
        <div class="tab active" data-tab="pending">Заявки (персонажи)</div>
        <div class="tab" data-tab="approved">Персонажи</div>
        <div class="tab" data-tab="nickname">Смена ника</div>
        <div class="tab" data-tab="tickets">Тикеты</div>
        <div class="tab" data-tab="achievements">Достижения</div>
        <div class="tab" data-tab="users">Пользователи</div>
        <div class="tab" data-tab="notify">Уведомления</div>
    </div>

    <div id="pending-tab" class="tab-content active"><div class="card"><div id="pending-list">Загрузка...</div></div></div>
    <div id="approved-tab" class="tab-content"><div class="card"><div id="approved-list">Загрузка...</div></div></div>
    <div id="nickname-tab" class="tab-content"><div class="card"><div id="nickname-list">Загрузка...</div></div></div>
    <div id="tickets-tab" class="tab-content"><div class="card"><div id="tickets-list">Загрузка...</div></div></div>
    <div id="achievements-tab" class="tab-content"><div class="card"><button id="new-ach-btn" class="btn">+ Новое достижение</button><hr style="margin:1rem 0"><h3>Выдать достижение</h3><div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;"><input type="text" id="give-nick" placeholder="Ник игрока"><select id="give-ach-select"></select><button id="give-ach-btn" class="btn">Выдать</button></div><div id="ach-list">Загрузка...</div></div></div>
    <div id="users-tab" class="tab-content"><div class="card"><div id="users-list">Загрузка...</div></div></div>
    <div id="notify-tab" class="tab-content"><div class="card"><h3>Массовое уведомление</h3><div style="display:flex; gap:0.5rem; flex-wrap:wrap;"><input type="text" id="notif-title" placeholder="Заголовок"><textarea id="notif-message" rows="2" placeholder="Текст" style="flex:1"></textarea><button id="send-mass-notif">Отправить</button></div></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, doc, addDoc, deleteDoc, serverTimestamp, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const profileSnap = await getDoc(doc(db, "profiles", user.uid));
        if (!profileSnap.exists() || !['admin','reviewer'].includes(profileSnap.data().role)) {
            alert('Нет прав');
            window.location.href = 'server.html';
            return;
        }
        loadPending();
        loadApproved();
        loadNicknameRequests();
        loadTickets();
        loadAchievements();
        loadUsers();
    });

    // === Заявки на персонажа ===
    async function loadPending() {
        const q = query(collection(db, "pending_characters"), where("status", "==", "pending"));
        const snap = await getDocs(q);
        const container = document.getElementById('pending-list');
        if (snap.empty) { container.innerHTML = '<div>Нет заявок</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>${userNick}</strong> хочет создать персонажа <strong>${data.characterName}</strong> (${data.profession})</div>
                <div><small>${data.history.substring(0,100)}...</small></div>
                <div class="actions">
                    <input type="text" id="comment-${docSnap.id}" placeholder="Причина отказа" style="max-width:180px;">
                    <button class="approve-char" data-id="${docSnap.id}">Одобрить</button>
                    <button class="reject-char" data-id="${docSnap.id}">Отклонить</button>
                </div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.approve-char').forEach(btn => btn.addEventListener('click', async () => approveCharacter(btn.getAttribute('data-id'))));
        document.querySelectorAll('.reject-char').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const comment = document.getElementById(`comment-${id}`).value.trim();
            await rejectCharacter(id, comment || 'Не указана');
        }));
    }
    async function approveCharacter(pendingId) {
        const pendingRef = doc(db, "pending_characters", pendingId);
        const pendingSnap = await getDoc(pendingRef);
        if (!pendingSnap.exists()) return;
        const data = pendingSnap.data();
        await addDoc(collection(db, "approved_characters"), {
            userId: data.userId, userNick: data.userNick, characterName: data.characterName,
            gender: data.gender, age: data.age, history: data.history, profession: data.profession,
            approvedAt: serverTimestamp(), approvedBy: currentUser.uid
        });
        await addDoc(collection(db, "notifications"), { userId: data.userId, title: 'Персонаж одобрен', message: `"${data.characterName}" принят.`, isRead: false, createdAt: serverTimestamp() });
        await deleteDoc(pendingRef);
        loadPending();
        loadApproved();
    }
    async function rejectCharacter(pendingId, reason) {
        const pendingRef = doc(db, "pending_characters", pendingId);
        const pendingSnap = await getDoc(pendingRef);
        if (!pendingSnap.exists()) return;
        const data = pendingSnap.data();
        await addDoc(collection(db, "notifications"), { userId: data.userId, title: 'Персонаж отклонён', message: `"${data.characterName}" отклонён. Причина: ${reason}`, isRead: false, createdAt: serverTimestamp() });
        await deleteDoc(pendingRef);
        loadPending();
    }

    // === Одобренные персонажи (ИСПРАВЛЕНО УДАЛЕНИЕ) ===
    async function loadApproved() {
        const snap = await getDocs(collection(db, "approved_characters"));
        const container = document.getElementById('approved-list');
        if (snap.empty) { container.innerHTML = '<div>Нет персонажей</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userNick;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${data.characterName}</strong> — игрок ${userNick} (${data.profession}, ${data.age} лет)</div>
                <div class="actions"><button class="delete-char" data-id="${docSnap.id}">Удалить</button></div>`;
            container.appendChild(div);
        }
        // Привязываем событие удаления напрямую, чтобы точно работало
        document.querySelectorAll('.delete-char').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const charId = btn.getAttribute('data-id');
                if (confirm('Вы уверены, что хотите удалить этого персонажа?')) {
                    await deleteDoc(doc(db, "approved_characters", charId));
                    loadApproved(); // обновляем список
                }
            });
        });
    }

    // === Смена ника ===
    async function loadNicknameRequests() {
        const q = query(collection(db, "nickname_requests"), where("status", "==", "pending"));
        const snap = await getDocs(q);
        const container = document.getElementById('nickname-list');
        if (snap.empty) { container.innerHTML = '<div>Нет заявок</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const userProfile = await getDoc(doc(db, "profiles", data.userId));
            const userNick = userProfile.exists() ? userProfile.data().nickname : data.userId;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${userNick}</strong> просит сменить ник на <strong>${data.newNickname}</strong></div>
                <div class="actions"><button class="approve-nick" data-id="${docSnap.id}" data-uid="${data.userId}" data-newname="${data.newNickname}">Одобрить</button><button class="reject-nick" data-id="${docSnap.id}">Отклонить</button></div>`;
            container.appendChild(div);
        }
        document.querySelectorAll('.approve-nick').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id'), uid = btn.getAttribute('data-uid'), newName = btn.getAttribute('data-newname');
            await updateDoc(doc(db, "profiles", uid), { nickname: newName, nickname_lower: newName.toLowerCase() });
            await updateDoc(doc(db, "nickname_requests", id), { status: 'approved' });
            await addDoc(collection(db, "notifications"), { userId: uid, title: 'Ник изменён', message: `Ваш ник изменён на "${newName}"`, isRead: false, createdAt: serverTimestamp() });
            loadNicknameRequests();
        }));
        document.querySelectorAll('.reject-nick').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const req = await getDoc(doc(db, "nickname_requests", id));
            const data = req.data();
            await updateDoc(doc(db, "nickname_requests", id), { status: 'rejected' });
            await addDoc(collection(db, "notifications"), { userId: data.userId, title: 'Смена ника отклонена', message: `Заявка на ник "${data.newNickname}" отклонена.`, isRead: false, createdAt: serverTimestamp() });
            loadNicknameRequests();
        }));
    }

    // === Тикеты ===
    async function loadTickets() {
        const q = collection(db, "tickets");
        const snap = await getDocs(q);
        const container = document.getElementById('tickets-list');
        if (snap.empty) { container.innerHTML = '<div>Нет тикетов</div>'; return; }
        const tickets = [];
        snap.forEach(docSnap => { tickets.push({ id: docSnap.id, ...docSnap.data() }); });
        tickets.sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
        container.innerHTML = '';
        for (const data of tickets) {
            const isOpen = data.status === 'open';
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div><strong>${data.userNick}</strong> — ${data.subject} <span class="status-badge ${!isOpen ? 'status-closed' : ''}">${isOpen ? 'Открыт' : 'Закрыт'}</span></div>
                <div><small>${data.message.substring(0,120)}</small></div>
                ${data.adminResponse ? `<div><strong>Ответ админа:</strong> ${data.adminResponse}</div>` : ''}
                <div class="actions">
                    ${isOpen ? `<textarea id="resp-${data.id}" placeholder="Ваш ответ" rows="2" style="width:250px;"></textarea><button class="reply-ticket" data-id="${data.id}">Ответить и закрыть</button>` : ''}
                    ${!isOpen ? `<button class="delete-ticket" data-id="${data.id}">Удалить</button>` : ''}
                </div>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.reply-ticket').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const response = document.getElementById(`resp-${id}`).value.trim();
            if (!response) return alert('Введите ответ');
            await updateDoc(doc(db, "tickets", id), { adminResponse: response, status: 'closed', closedAt: serverTimestamp() });
            const ticket = await getDoc(doc(db, "tickets", id));
            const data = ticket.data();
            await addDoc(collection(db, "notifications"), { userId: data.userId, title: 'Ответ по обращению', message: `По вашему обращению "${data.subject}" дан ответ: ${response}`, isRead: false, createdAt: serverTimestamp() });
            loadTickets();
        }));
        document.querySelectorAll('.delete-ticket').forEach(btn => btn.addEventListener('click', async () => {
            if(confirm('Удалить тикет?')){ await deleteDoc(doc(db, "tickets", btn.getAttribute('data-id'))); loadTickets(); }
        }));
    }

    // === Достижения ===
    async function loadAchievements() {
        const snap = await getDocs(collection(db, "achievements"));
        const container = document.getElementById('ach-list');
        const select = document.getElementById('give-ach-select');
        if (snap.empty) {
            container.innerHTML = '<p>Нет достижений</p>';
            select.innerHTML = '<option>Нет</option>';
            return;
        }
        container.innerHTML = '';
        select.innerHTML = '';
        snap.forEach(docSnap => {
            const a = docSnap.data();
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${a.title}</strong> — ${a.description}</div><div class="actions"><button class="delete-ach" data-id="${docSnap.id}">Удалить</button></div>`;
            container.appendChild(div);
            const opt = document.createElement('option');
            opt.value = docSnap.id;
            opt.textContent = a.title;
            select.appendChild(opt);
        });
        document.querySelectorAll('.delete-ach').forEach(btn => btn.addEventListener('click', async () => { if(confirm('Удалить?')){ await deleteDoc(doc(db, "achievements", btn.getAttribute('data-id'))); loadAchievements(); } }));
    }
    document.getElementById('new-ach-btn')?.addEventListener('click', async () => {
        const t = prompt('Название'); if(!t) return;
        const d = prompt('Описание'); if(!d) return;
        await addDoc(collection(db, "achievements"), { title: t, description: d });
        loadAchievements();
    });
    document.getElementById('give-ach-btn')?.addEventListener('click', async () => {
        const nick = document.getElementById('give-nick').value.trim();
        const achId = document.getElementById('give-ach-select').value;
        if(!nick || !achId) return alert('Введите ник');
        const profiles = await getDocs(collection(db, "profiles"));
        let uid = null;
        for(const p of profiles.docs) if(p.data().nickname.toLowerCase() === nick.toLowerCase()) { uid = p.id; break; }
        if(!uid) return alert('Игрок не найден');
        const existing = await getDocs(query(collection(db, "user_achievements"), where("userId", "==", uid), where("achievementId", "==", achId)));
        if(!existing.empty) return alert('Уже есть');
        await addDoc(collection(db, "user_achievements"), { userId: uid, achievementId: achId, earnedAt: serverTimestamp() });
        alert('Выдано');
    });

    // === Пользователи ===
    async function loadUsers() {
        const snap = await getDocs(collection(db, "profiles"));
        const container = document.getElementById('users-list');
        if (snap.empty) { container.innerHTML = '<div>Нет пользователей</div>'; return; }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const role = data.role || 'user';
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${data.nickname}</strong> — ${data.email}</div>
                <div class="actions">
                    <select class="role-select" data-uid="${docSnap.id}">
                        <option value="user" ${role==='user' ? 'selected' : ''}>Пользователь</option>
                        <option value="reviewer" ${role==='reviewer' ? 'selected' : ''}>Анкетолог</option>
                        <option value="admin" ${role==='admin' ? 'selected' : ''}>Админ</option>
                    </select>
                    <button class="save-role" data-uid="${docSnap.id}">Сохранить</button>
                </div>`;
            container.appendChild(div);
        }
        document.querySelectorAll('.save-role').forEach(btn => btn.addEventListener('click', async () => {
            const uid = btn.getAttribute('data-uid');
            const select = document.querySelector(`.role-select[data-uid="${uid}"]`);
            await updateDoc(doc(db, "profiles", uid), { role: select.value });
            alert('Роль обновлена');
        }));
    }

    // === Массовые уведомления ===
    document.getElementById('send-mass-notif')?.addEventListener('click', async () => {
        const title = document.getElementById('notif-title').value.trim();
        const msg = document.getElementById('notif-message').value.trim();
        if(!title || !msg) return alert('Заполните поля');
        const profiles = await getDocs(collection(db, "profiles"));
        for(const profile of profiles.docs) {
            await addDoc(collection(db, "notifications"), { userId: profile.id, title, message: msg, isRead: false, createdAt: serverTimestamp() });
        }
        alert(`Отправлено ${profiles.size} уведомлений`);
        document.getElementById('notif-title').value = '';
        document.getElementById('notif-message').value = '';
    });

    // Переключение вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(`${target}-tab`).classList.add('active');
            if(target==='approved') loadApproved();
            if(target==='nickname') loadNicknameRequests();
            if(target==='tickets') loadTickets();
            if(target==='achievements') loadAchievements();
            if(target==='users') loadUsers();
        });
    });
</script>
</body>
</html>
