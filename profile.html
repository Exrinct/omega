<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Профиль — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0A0A0A;
            color: #E6E6E6;
            padding: 1rem;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.65rem;
            color: #3B6E4F;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
            z-index: 100;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.2rem;
            color: #3B6E4F;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .profile-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
        }
        .profile-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .profile-nick {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }
        .online-badge {
            background: #2E8B57;
            border-radius: 30px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            margin-left: 0.5rem;
            display: inline-block;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .stat {
            background: #1A1A1A;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }
        .btn-outline {
            background: none;
            border: 1px solid #3B6E4F;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            color: #E6E6E6;
            cursor: pointer;
            margin: 0.5rem 0;
            font-size: 0.8rem;
        }
        .settings-group {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .char-card, .achievement-card {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 0.8rem;
            border-left: 3px solid #3B6E4F;
        }
        .char-name, .ach-title { font-weight: 500; margin-bottom: 0.2rem; }
        .char-meta, .ach-desc { font-size: 0.7rem; color: #A0A0A0; }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index:1000;
        }
        .modal-content {
            background: #111;
            border: 1px solid #222;
            border-radius: 28px;
            padding: 1.5rem;
            max-width: 400px;
            width:90%;
        }
        .modal-content input {
            width:100%;
            background: #1A1A1A;
            border:1px solid #333;
            border-radius:14px;
            padding:0.6rem;
            margin:1rem 0;
            color:white;
        }
        .modal-buttons {
            display: flex;
            gap:0.8rem;
        }
        .error { color:#E06C6C; font-size:0.75rem; margin-top:0.3rem; }
        @media (max-width: 640px) {
            .profile-card { padding: 1rem; }
            .profile-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="version">v3.1.0</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад</a>
    <div id="profile-content">Загрузка...</div>
</div>

<div id="nickname-modal" class="modal">
    <div class="modal-content">
        <h3>Смена ника</h3>
        <input type="text" id="new-nickname" placeholder="Новый ник">
        <div class="modal-buttons">
            <button id="submit-nickname">Отправить заявку</button>
            <button id="cancel-nickname">Отмена</button>
        </div>
        <div id="nick-error" class="error"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const container = document.getElementById('profile-content');

    if (!uid) {
        container.innerHTML = '<div class="profile-card">Не указан пользователь</div>';
    } else {
        loadProfile(uid);
    }

    async function loadProfile(userId) {
        try {
            const profileSnap = await getDoc(doc(db, "profiles", userId));
            if (!profileSnap.exists()) {
                container.innerHTML = '<div class="profile-card">Пользователь не найден</div>';
                return;
            }
            const profile = profileSnap.data();
            const nickname = profile.nickname || "Неизвестно";
            const isOnline = profile.isOnline === true;
            const currentUserId = auth.currentUser?.uid;
            const isOwnProfile = currentUserId === userId;
            
            const charsSnap = await getDocs(query(collection(db, "approved_characters"), where("userId", "==", userId)));
            const characters = charsSnap.docs.map(d => d.data());
            const achievementsSnap = await getDocs(query(collection(db, "user_achievements"), where("userId", "==", userId)));
            const allAch = await getDocs(collection(db, "achievements"));
            const achMap = {};
            allAch.forEach(d => { achMap[d.id] = d.data(); });
            const earned = achievementsSnap.docs.map(d => achMap[d.data().achievementId]).filter(a => a);
            const pendingSnap = await getDocs(query(collection(db, "pending_characters"), where("userId", "==", userId)));
            const pendingCount = pendingSnap.size;
            
            let settingsHtml = '';
            let changeNickButton = '';
            if (isOwnProfile) {
                changeNickButton = `<button id="change-nick-btn" class="btn-outline">Сменить ник</button>`;
                const settings = profile.settings || { email_notifications: true, theme: "dark" };
                settingsHtml = `
                    <div class="settings-group">
                        <h3 style="margin-bottom:0.5rem;">Настройки</h3>
                        <label style="display:flex; align-items:center; gap:0.5rem;">
                            <input type="checkbox" id="email_notifications" ${settings.email_notifications ? 'checked' : ''}>
                            Уведомления на email
                        </label>
                        <div style="margin-top:0.5rem;">
                            <label>Тема:</label>
                            <select id="theme">
                                <option value="dark" ${settings.theme === 'dark' ? 'selected' : ''}>Тёмная</option>
                                <option value="light" ${settings.theme === 'light' ? 'selected' : ''}>Светлая (скоро)</option>
                            </select>
                        </div>
                        <button id="save-settings" class="btn-outline" style="margin-top:0.8rem;">Сохранить</button>
                    </div>
                `;
            }
            
            const html = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div>
                            <span class="profile-nick">${escapeHtml(nickname)}</span>
                            ${isOnline ? '<span class="online-badge">В сети</span>' : '<span class="online-badge" style="background:#444;">Офлайн</span>'}
                        </div>
                        <div class="stats">
                            <div class="stat">💰 ${profile.rp_points || 0} монет</div>
                            <div class="stat">📜 Персонажей: ${characters.length}/3</div>
                            <div class="stat">⏳ Заявок: ${pendingCount}</div>
                            <div class="stat">🏆 Достижений: ${earned.length}</div>
                        </div>
                    </div>
                    ${changeNickButton}
                    ${settingsHtml}
                    <h3 style="margin:1rem 0 0.5rem;">Персонажи</h3>
                    <div class="grid">
                        ${characters.length === 0 ? '<div class="char-card">Нет одобренных персонажей</div>' : characters.map(c => `
                            <div class="char-card">
                                <div class="char-name">${escapeHtml(c.characterName)}</div>
                                <div class="char-meta">${escapeHtml(c.profession)} • ${c.gender} • ${c.age} лет</div>
                                <div class="char-meta">${escapeHtml(c.history.substring(0,80))}...</div>
                            </div>
                        `).join('')}
                    </div>
                    <h3 style="margin:1rem 0 0.5rem;">Достижения</h3>
                    <div class="grid">
                        ${earned.length === 0 ? '<div class="achievement-card">Нет достижений</div>' : earned.map(a => `
                            <div class="achievement-card">
                                <div class="ach-title">${escapeHtml(a.title)}</div>
                                <div class="ach-desc">${escapeHtml(a.description)}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            container.innerHTML = html;
            
            if (isOwnProfile) {
                document.getElementById('save-settings')?.addEventListener('click', async () => {
                    const emailNotif = document.getElementById('email_notifications').checked;
                    const theme = document.getElementById('theme').value;
                    await updateDoc(doc(db, "profiles", userId), { settings: { email_notifications: emailNotif, theme } });
                    alert('Настройки сохранены');
                });
                const changeBtn = document.getElementById('change-nick-btn');
                const modal = document.getElementById('nickname-modal');
                const submitBtn = document.getElementById('submit-nickname');
                const cancelBtn = document.getElementById('cancel-nickname');
                const nickInput = document.getElementById('new-nickname');
                const errorSpan = document.getElementById('nick-error');
                changeBtn.addEventListener('click', () => {
                    modal.style.display = 'flex';
                    nickInput.value = '';
                    errorSpan.innerText = '';
                });
                cancelBtn.addEventListener('click', () => modal.style.display = 'none');
                submitBtn.addEventListener('click', async () => {
                    const newNick = nickInput.value.trim();
                    if (!newNick) { errorSpan.innerText = 'Введите новый ник'; return; }
                    if (!/^[a-zA-Z0-9_]{3,16}$/.test(newNick)) {
                        errorSpan.innerText = 'Ник: 3-16 символов, латиница, цифры, _';
                        return;
                    }
                    const existing = await getDocs(query(collection(db, "profiles"), where("nickname_lower", "==", newNick.toLowerCase())));
                    if (!existing.empty) { errorSpan.innerText = 'Ник уже занят'; return; }
                    await addDoc(collection(db, "nickname_requests"), {
                        userId, oldNickname: nickname, newNickname: newNick,
                        status: 'pending', createdAt: serverTimestamp()
                    });
                    alert('Заявка отправлена');
                    modal.style.display = 'none';
                });
            }
        } catch (err) {
            container.innerHTML = `<div class="profile-card">Ошибка: ${err.message}</div>`;
        }
    }
    
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
</script>
</body>
</html>
