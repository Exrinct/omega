<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Профиль — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg:#141618; --bg-deep:#0f1011; --surface:#1c1e21; --surface-2:#222528; --surface-3:#2a2d31;
            --border:rgba(255,255,255,0.07); --border-mid:rgba(255,255,255,0.11); --border-hi:rgba(255,255,255,0.18);
            --accent:#4ade80; --accent-dim:#22c55e; --accent-mute:rgba(74,222,128,0.10);
            --text:#f0f0f0; --text-2:#9ca3af; --text-3:#4b5563;
            --red:#f87171; --yellow:#fbbf24; --radius:14px; --radius-lg:20px;
            --ease-out:cubic-bezier(.16,1,.3,1);
        }
        body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; }
        .navbar { background:rgba(20,22,24,.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:.75rem 2rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; position:sticky; top:0; z-index:50; }
        .brand-logo { display:flex; align-items:center; gap:.55rem; text-decoration:none; }
        .brand-mark { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent-dim)); border-radius:8px; display:flex; align-items:center; justify-content:center; }
        .brand-mark svg { width:15px; height:15px; fill:#0f1011; }
        .brand-name { font-family:'DM Serif Display',Georgia,serif; font-size:1.15rem; color:var(--text); }
        .back-link { color:var(--text-2); text-decoration:none; font-size:.85rem; display:flex; align-items:center; gap:.4rem; transition:color .15s; }
        .back-link:hover { color:var(--text); }
        .container { max-width:840px; margin:2rem auto; padding:0 1.5rem; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.8rem; margin-bottom:1.2rem; }
        /* Profile header */
        .profile-hero { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
        .profile-nick { font-family:'DM Serif Display',Georgia,serif; font-size:2rem; font-weight:400; letter-spacing:-.02em; color:var(--text); margin-bottom:.4rem; }
        .online-badge { display:inline-flex; align-items:center; gap:.35rem; background:rgba(74,222,128,.12); color:var(--accent); border:1px solid rgba(74,222,128,.2); border-radius:999px; padding:.2rem .7rem; font-size:.7rem; font-weight:500; margin-left:.5rem; }
        .offline-badge { display:inline-flex; align-items:center; gap:.35rem; background:var(--surface-2); color:var(--text-3); border:1px solid var(--border); border-radius:999px; padding:.2rem .7rem; font-size:.7rem; font-weight:500; margin-left:.5rem; }
        .stats-row { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.6rem; }
        .stat-chip { background:var(--surface-2); border:1px solid var(--border); border-radius:999px; padding:.25rem .8rem; font-size:.75rem; color:var(--text-2); }
        .btn-outline { background:transparent; border:1px solid var(--border-mid); border-radius:999px; padding:.45rem 1.1rem; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; color:var(--text-2); cursor:pointer; transition:background .15s,border-color .15s,color .15s; }
        .btn-outline:hover { background:var(--surface-2); border-color:var(--border-hi); color:var(--text); }
        .btn-primary { background:var(--accent); border:none; border-radius:999px; padding:.5rem 1.2rem; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:600; color:#0f1011; cursor:pointer; transition:background .18s,transform .15s; box-shadow:0 2px 10px rgba(74,222,128,.2); }
        .btn-primary:hover { background:#6bef96; transform:translateY(-1px); }
        /* Settings */
        .settings-block { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem; margin:1rem 0; }
        .settings-block h4 { font-size:.8rem; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:1rem; }
        .setting-row { display:flex; align-items:center; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); }
        .setting-row:last-child { border-bottom:none; }
        .setting-label { font-size:.85rem; color:var(--text-2); }
        .setting-row select { background:var(--surface-3); border:1px solid var(--border-mid); border-radius:8px; padding:.3rem .6rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.82rem; outline:none; }
        /* Grid */
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.8rem; margin-top:.8rem; }
        .char-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; border-left:2px solid var(--accent); }
        .char-name { font-size:.9rem; font-weight:500; color:var(--text); margin-bottom:.3rem; }
        .char-meta { font-size:.75rem; color:var(--text-3); line-height:1.5; }
        .ach-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; }
        .ach-title { font-size:.88rem; font-weight:500; color:var(--text); margin-bottom:.25rem; }
        .ach-desc { font-size:.75rem; color:var(--text-3); }
        .section-title { font-family:'DM Serif Display',Georgia,serif; font-size:1.05rem; font-weight:400; color:var(--text); margin-bottom:.2rem; }
        .section-sub { font-size:.75rem; color:var(--text-3); margin-bottom:.8rem; }
        /* Modal */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(16px); z-index:1000; justify-content:center; align-items:center; padding:1.5rem; }
        .modal-card { background:var(--surface); border:1px solid var(--border-hi); border-radius:var(--radius-lg); padding:2rem; max-width:380px; width:100%; animation:scaleIn .25s var(--ease-out); box-shadow:0 32px 80px rgba(0,0,0,.5); }
        .modal-card h3 { font-family:'DM Serif Display',Georgia,serif; font-size:1.25rem; font-weight:400; margin-bottom:1rem; }
        .modal-card input { width:100%; background:var(--surface-2); border:1px solid var(--border-mid); border-radius:var(--radius); padding:.72rem 1rem; margin:.4rem 0; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.9rem; outline:none; transition:border-color .18s,box-shadow .18s; }
        .modal-card input:focus { border-color:rgba(74,222,128,.4); box-shadow:0 0 0 3px var(--accent-mute); }
        .modal-btns { display:flex; gap:.8rem; margin-top:1rem; }
        .modal-btns .btn-primary { flex:1; }
        .btn-ghost { flex:1; background:transparent; border:1px solid var(--border-mid); border-radius:999px; padding:.5rem 1rem; font-family:'DM Sans',sans-serif; font-size:.85rem; color:var(--text-2); cursor:pointer; transition:background .15s; }
        .btn-ghost:hover { background:var(--surface-2); }
        .error { color:var(--red); font-size:.75rem; margin-top:.3rem; display:none; }
        .version { position:fixed; bottom:1rem; right:1.2rem; font-size:.68rem; color:var(--text-3); z-index:100; }
        @keyframes scaleIn { from{opacity:0;transform:scale(.95) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);} }
        @media(max-width:640px) { .container{padding:0 1rem;} .profile-hero{flex-direction:column;} .grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
<div class="version">v4.0.0</div>
<nav class="navbar">
    <a href="server.html" class="brand-logo">
        <div class="brand-mark"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.8 1.56 5.24 3.87 6.54L8 20h2.5v-1c0-.55.45-1 1-1h1c.55 0 1 .45 1 1v1H16l-.87-4.46C17.44 14.24 19 11.8 19 9c0-3.87-3.13-7-7-7z"/></svg></div>
        <span class="brand-name">Omega</span>
    </a>
    <a href="server.html" class="back-link">← Назад</a>
</nav>

<div class="container">
    <div id="profile-content">
        <div class="card" style="text-align:center;color:var(--text-3);padding:3rem;">Загрузка…</div>
    </div>
</div>

<div id="nickname-modal" class="modal">
    <div class="modal-card">
        <h3>Смена ника</h3>
        <input type="text" id="new-nickname" placeholder="Новый ник (латиница, цифры, _)">
        <div class="error" id="nick-error"></div>
        <div class="modal-btns">
            <button id="cancel-nickname" class="btn-ghost">Отмена</button>
            <button id="submit-nickname" class="btn-primary">Отправить заявку</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig={apiKey:"AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",authDomain:"omega-5de05.firebaseapp.com",projectId:"omega-5de05",storageBucket:"omega-5de05.firebasestorage.app",messagingSenderId:"438319801454",appId:"1:438319801454:web:775924ab8ef4417760b27f"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
    const uid=new URLSearchParams(window.location.search).get('uid');
    const container=document.getElementById('profile-content');
    if(!uid){container.innerHTML='<div class="card">Не указан пользователь</div>';}else{loadProfile(uid);}
    function esc(s){return s?s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'):'';}
    async function loadProfile(userId){
        try{
            const ps=await getDoc(doc(db,"profiles",userId));
            if(!ps.exists()){container.innerHTML='<div class="card">Пользователь не найден</div>';return;}
            const p=ps.data(),nickname=p.nickname||"Неизвестно",isOnline=p.isOnline===true,isOwn=auth.currentUser?.uid===userId;
            const chars=(await getDocs(query(collection(db,"approved_characters"),where("userId","==",userId)))).docs.map(d=>d.data());
            const achSnap=await getDocs(query(collection(db,"user_achievements"),where("userId","==",userId)));
            const allAch=await getDocs(collection(db,"achievements"));
            const achMap={};allAch.forEach(d=>{achMap[d.id]=d.data();});
            const earned=achSnap.docs.map(d=>achMap[d.data().achievementId]).filter(a=>a);
            const pending=(await getDocs(query(collection(db,"pending_characters"),where("userId","==",userId)))).size;
            let settingsHtml='',changeNickBtn='';
            if(isOwn){
                changeNickBtn=`<button id="change-nick-btn" class="btn-outline">Сменить ник</button>`;
                const s=p.settings||{email_notifications:true,theme:"dark"};
                settingsHtml=`<div class="settings-block"><h4>Настройки</h4>
                    <div class="setting-row"><span class="setting-label">Уведомления на email</span><input type="checkbox" id="email_notifications" ${s.email_notifications?'checked':''}></div>
                    <div class="setting-row"><span class="setting-label">Тема интерфейса</span><select id="theme"><option value="dark" ${s.theme==='dark'?'selected':''}>Тёмная</option><option value="light" ${s.theme==='light'?'selected':''}>Светлая (скоро)</option></select></div>
                    <div style="margin-top:1rem;"><button id="save-settings" class="btn-primary" style="padding:.5rem 1.5rem;">Сохранить</button></div></div>`;
            }
            container.innerHTML=`
                <div class="card">
                    <div class="profile-hero">
                        <div>
                            <div><span class="profile-nick">${esc(nickname)}</span>${isOnline?'<span class="online-badge">● В сети</span>':'<span class="offline-badge">Офлайн</span>'}</div>
                            <div class="stats-row">
                                <span class="stat-chip">⬡ ${p.rp_points||0} монет</span>
                                <span class="stat-chip">Персонажей: ${chars.length}/3</span>
                                <span class="stat-chip">Заявок: ${pending}</span>
                                <span class="stat-chip">Достижений: ${earned.length}</span>
                            </div>
                        </div>
                        <div>${changeNickBtn}</div>
                    </div>
                    ${settingsHtml}
                </div>
                <div class="card">
                    <div class="section-title">Персонажи</div>
                    <div class="section-sub">Одобренные заявки</div>
                    <div class="grid">${chars.length===0?'<div class="char-card"><span class="char-meta">Нет одобренных персонажей</span></div>':chars.map(c=>`<div class="char-card"><div class="char-name">${esc(c.characterName)}</div><div class="char-meta">${esc(c.profession||c.selectedRole)} · ${c.gender||''} · ${c.age} лет<br>${esc(c.history.substring(0,90))}…</div></div>`).join('')}</div>
                </div>
                <div class="card">
                    <div class="section-title">Достижения</div>
                    <div class="section-sub">Получено за активность</div>
                    <div class="grid">${earned.length===0?'<div class="ach-card"><span class="ach-desc">Нет достижений</span></div>':earned.map(a=>`<div class="ach-card"><div class="ach-title">${esc(a.title)}</div><div class="ach-desc">${esc(a.description)}</div></div>`).join('')}</div>
                </div>`;
            if(isOwn){
                document.getElementById('save-settings')?.addEventListener('click',async()=>{const en=document.getElementById('email_notifications').checked,th=document.getElementById('theme').value;await updateDoc(doc(db,"profiles",userId),{settings:{email_notifications:en,theme:th}});alert('Сохранено');});
                const modal=document.getElementById('nickname-modal');
                document.getElementById('change-nick-btn').addEventListener('click',()=>{modal.style.display='flex';document.getElementById('new-nickname').value='';document.getElementById('nick-error').style.display='none';});
                document.getElementById('cancel-nickname').addEventListener('click',()=>modal.style.display='none');
                document.getElementById('submit-nickname').addEventListener('click',async()=>{
                    const nn=document.getElementById('new-nickname').value.trim(),err=document.getElementById('nick-error');err.style.display='none';
                    if(!nn){err.textContent='Введите ник';err.style.display='block';return;}
                    if(!/^[a-zA-Z0-9_]{3,16}$/.test(nn)){err.textContent='3–16 символов: латиница, цифры, _';err.style.display='block';return;}
                    if(!(await getDocs(query(collection(db,"profiles"),where("nickname_lower","==",nn.toLowerCase())))).empty){err.textContent='Ник уже занят';err.style.display='block';return;}
                    await addDoc(collection(db,"nickname_requests"),{userId,oldNickname:nickname,newNickname:nn,status:'pending',createdAt:serverTimestamp()});
                    alert('Заявка отправлена');modal.style.display='none';
                });
            }
        }catch(err){container.innerHTML=`<div class="card">Ошибка: ${err.message}</div>`;}
    }
</script>
</body>
</html>
