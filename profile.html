<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль игрока — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 2rem;
            position: relative;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            color: #3b6e4f;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 100;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #3b6e4f;
            text-decoration: none;
        }
        .profile-card {
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            border-bottom: 1px solid #2c2c2c;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .profile-nick {
            font-size: 2rem;
            font-weight: 600;
            color: #3b6e4f;
        }
        .profile-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }
        .stat {
            background: #1e1e1e;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
        }
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #ddd;
        }
        .char-grid, .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .char-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 1rem;
            border-left: 3px solid #3b6e4f;
        }
        .char-name { font-weight: 600; font-size: 1.1rem; }
        .char-meta { font-size: 0.8rem; color: #aaa; margin-top: 0.2rem; }
        .achievement-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 0.8rem;
        }
        .ach-title { font-weight: 500; }
        .ach-desc { font-size: 0.75rem; color: #aaa; margin-top: 0.2rem; }
        .empty-message { color: #888; font-style: italic; padding: 1rem; }
        .online-badge {
            background: #2a5a2a;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            color: #aaffaa;
            display: inline-block;
            margin-left: 1rem;
        }
        .btn-change, .save-settings {
            background: #2d5a27;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: white;
            cursor: pointer;
            margin-top: 1rem;
        }
        .settings-group {
            margin: 1rem 0;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 16px;
        }
        .settings-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #121212;
            border: 1px solid #3b6e4f;
            border-radius: 28px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }
        .modal-content input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0.6rem;
            margin: 1rem 0;
            color: white;
        }
        .modal-buttons { display: flex; gap: 1rem; }
        .error { color: #e06c6c; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="version">v3.0.0</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад в панель</a>
    <div id="profile-content">Загрузка...</div>
</div>

<div id="nickname-modal" class="modal">
    <div class="modal-content">
        <h3>Смена ника</h3>
        <input type="text" id="new-nickname" placeholder="Новый ник">
        <div class="modal-buttons">
            <button id="submit-nickname">Отправить заявку</button>
            <button id="cancel-nickname">Отмена</button>
        </div>
        <div id="nick-error" class="error"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const container = document.getElementById('profile-content');

    if (!uid) {
        container.innerHTML = '<div class="profile-card">Не указан пользователь</div>';
    } else {
        loadProfile(uid);
    }

    async function loadProfile(userId) {
        try {
            const profileSnap = await getDoc(doc(db, "profiles", userId));
            if (!profileSnap.exists()) {
                container.innerHTML = '<div class="profile-card">Пользователь не найден</div>';
                return;
            }
            const profile = profileSnap.data();
            const nickname = profile.nickname || "Неизвестно";
            const isOnline = profile.isOnline === true;
            const currentUserId = auth.currentUser?.uid;
            const isOwnProfile = currentUserId === userId;
            
            const charsSnap = await getDocs(query(collection(db, "approved_characters"), where("userId", "==", userId)));
            const characters = charsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const userAchSnap = await getDocs(query(collection(db, "user_achievements"), where("userId", "==", userId)));
            const userAchievements = userAchSnap.docs.map(d => d.data());
            const allAchievements = await getDocs(collection(db, "achievements"));
            const achievementsMap = {};
            allAchievements.forEach(d => { achievementsMap[d.id] = d.data(); });
            const earnedAchievements = userAchievements.map(ua => achievementsMap[ua.achievementId]).filter(a => a);
            
            const pendingSnap = await getDocs(query(collection(db, "pending_characters"), where("userId", "==", userId)));
            const pendingCount = pendingSnap.size;
            
            let settingsHtml = '';
            let changeNickButton = '';
            if (isOwnProfile) {
                changeNickButton = `<button id="change-nick-btn" class="btn-change">Сменить ник</button>`;
                const settings = profile.settings || { email_notifications: true, theme: "dark" };
                settingsHtml = `
                    <div class="settings-group">
                        <h3>Настройки</h3>
                        <label>
                            <input type="checkbox" id="email_notifications" ${settings.email_notifications ? 'checked' : ''}>
                            Получать уведомления на email
                        </label>
                        <div style="margin-top:0.5rem;">
                            <label>Тема оформления:</label>
                            <select id="theme">
                                <option value="dark" ${settings.theme === 'dark' ? 'selected' : ''}>Тёмная</option>
                                <option value="light" ${settings.theme === 'light' ? 'selected' : ''}>Светлая (скоро)</option>
                            </select>
                        </div>
                        <button id="save-settings" class="save-settings">Сохранить настройки</button>
                    </div>
                `;
            }
            
            const html = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div>
                            <span class="profile-nick">${escapeHtml(nickname)}</span>
                            ${isOnline ? '<span class="online-badge">В сети</span>' : '<span class="online-badge" style="background:#444;">Офлайн</span>'}
                        </div>
                        <div class="profile-stats">
                            <div class="stat">💰 ${profile.rp_points || 0} монет</div>
                            <div class="stat">📜 Персонажей: ${characters.length} / 3</div>
                            <div class="stat">⏳ Заявок: ${pendingCount}</div>
                            <div class="stat">🏆 Достижений: ${earnedAchievements.length}</div>
                        </div>
                    </div>
                    ${changeNickButton}
                    ${settingsHtml}
                    <div style="margin-bottom: 2rem; margin-top: 1rem;">
                        <h3 class="section-title">📖 Персонажи</h3>
                        <div class="char-grid">
                            ${characters.length === 0 ? '<div class="empty-message">Нет одобренных персонажей</div>' : characters.map(char => `
                                <div class="char-card">
                                    <div class="char-name">${escapeHtml(char.characterName)}</div>
                                    <div class="char-meta">${escapeHtml(char.profession)} • ${escapeHtml(char.gender)} • ${char.age} лет</div>
                                    <div class="char-meta">${escapeHtml(char.history.substring(0, 80))}...</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div>
                        <h3 class="section-title">🏆 Достижения</h3>
                        <div class="achievement-grid">
                            ${earnedAchievements.length === 0 ? '<div class="empty-message">Нет заработанных достижений</div>' : earnedAchievements.map(ach => `
                                <div class="achievement-card">
                                    <div class="ach-title">${escapeHtml(ach.title)}</div>
                                    <div class="ach-desc">${escapeHtml(ach.description)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            
            if (isOwnProfile) {
                document.getElementById('save-settings')?.addEventListener('click', async () => {
                    const email_notifications = document.getElementById('email_notifications').checked;
                    const theme = document.getElementById('theme').value;
                    await updateDoc(doc(db, "profiles", userId), { settings: { email_notifications, theme } });
                    alert('Настройки сохранены');
                });
                const changeBtn = document.getElementById('change-nick-btn');
                const modal = document.getElementById('nickname-modal');
                const submitBtn = document.getElementById('submit-nickname');
                const cancelBtn = document.getElementById('cancel-nickname');
                const nickInput = document.getElementById('new-nickname');
                const errorSpan = document.getElementById('nick-error');
                changeBtn.addEventListener('click', () => {
                    modal.style.display = 'flex';
                    nickInput.value = '';
                    errorSpan.textContent = '';
                });
                cancelBtn.addEventListener('click', () => modal.style.display = 'none');
                submitBtn.addEventListener('click', async () => {
                    const newNick = nickInput.value.trim();
                    if (!newNick) { errorSpan.textContent = 'Введите новый ник'; return; }
                    if (!/^[a-zA-Z0-9_]{3,16}$/.test(newNick)) {
                        errorSpan.textContent = 'Ник: 3-16 символов (латиница, цифры, _)';
                        return;
                    }
                    const profilesRef = collection(db, "profiles");
                    const q = query(profilesRef, where("nickname_lower", "==", newNick.toLowerCase()));
                    const existing = await getDocs(q);
                    if (!existing.empty) { errorSpan.textContent = 'Ник уже занят'; return; }
                    await addDoc(collection(db, "nickname_requests"), {
                        userId: userId, oldNickname: nickname, newNickname: newNick,
                        status: 'pending', createdAt: serverTimestamp()
                    });
                    alert('Заявка отправлена');
                    modal.style.display = 'none';
                });
            }
        } catch (err) {
            container.innerHTML = `<div class="profile-card">Ошибка: ${err.message}</div>`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }
</script>
</body>
</html>
