<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega RolePlay — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            color: #3b6e4f;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 100;
        }
        .card {
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 460px;
        }
        h1 { font-size: 1.6rem; margin-bottom: 2rem; text-align: center; }
        .accent { color: #3b6e4f; }
        .google-btn {
            width: 100%;
            background: #2c2c2c;
            border: 1px solid #3b6e4f;
            border-radius: 14px;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .google-btn:hover { background: #3b6e4f20; }
        .divider { text-align: center; font-size: 0.75rem; color: #909090; margin: 1rem 0; }
        .field { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; color: #c0c0c0; }
        input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 0.8rem;
            color: #f0f0f0;
            outline: none;
        }
        input:focus { border-color: #3b6e4f; }
        .error { color: #e06c6c; font-size: 0.7rem; margin-top: 0.4rem; display: none; }
        button[type="submit"] {
            width: 100%;
            background: #2d5a27;
            border: none;
            border-radius: 14px;
            padding: 0.8rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .register-link { color: #3b6e4f; cursor: pointer; }
        .captcha-block {
            background: #1e1e1e;
            border-radius: 14px;
            padding: 0.8rem;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #121212;
            border: 1px solid #3b6e4f;
            border-radius: 28px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-buttons { display: flex; gap: 1rem; margin-top: 1rem; justify-content: center; }
        .modal-buttons button {
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
        }
        #modal-submit { background: #2d5a27; border: none; color: white; }
        #modal-cancel { background: none; border: 1px solid #666; color: #ccc; }
    </style>
</head>
<body>
<div class="version">v1.1.0</div>
<div class="card">
    <h1>Твоя легенда рождается здесь.<br><span class="accent">Omega RolePlay</span></h1>
    <button id="google-login" class="google-btn">Войти через Google</button>
    <div class="divider">или по паролю</div>
    <div>
        <div class="field">
            <label>Ник в Minecraft</label>
            <input type="text" id="login-nick" placeholder="Введите ник">
            <div class="error" id="nick-error"></div>
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="login-pass" placeholder="Введите пароль">
            <div class="error" id="pass-error"></div>
        </div>
        <button type="submit" id="login-btn">Войти</button>
    </div>
    <div class="divider">Нет аккаунта? <span id="show-register" class="register-link">Зарегистрироваться</span></div>
    <div id="register-block" style="display:none; margin-top:1.5rem;">
        <div class="field">
            <label>Ник в Minecraft</label>
            <input type="text" id="reg-nick" placeholder="Придумайте ник">
            <div class="error" id="reg-nick-error"></div>
        </div>
        <div class="field">
            <label>Пароль (мин. 8 символов)</label>
            <input type="password" id="reg-pass" placeholder="Минимум 8 символов">
            <div class="error" id="reg-pass-error"></div>
        </div>
        <div class="captcha-block">
            <span id="captcha-question"></span>
            <input type="text" id="captcha-answer" style="width:70px;" placeholder="?">
        </div>
        <div class="error" id="captcha-error"></div>
        <button id="register-btn">Зарегистрироваться</button>
    </div>
</div>

<div id="nickname-modal" class="modal">
    <div class="modal-content">
        <h3>Введите ваш ник в Minecraft</h3>
        <input type="text" id="modal-nick" placeholder="Ник" autocomplete="off">
        <div class="error" id="modal-error" style="margin-top:0.5rem;"></div>
        <div class="modal-buttons">
            <button id="modal-submit">Подтвердить</button>
            <button id="modal-cancel">Отмена</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let captchaNum1, captchaNum2;
    function generateCaptcha() {
        captchaNum1 = Math.floor(Math.random() * 10) + 1;
        captchaNum2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById('captcha-question').textContent = `${captchaNum1} + ${captchaNum2} = ?`;
        document.getElementById('captcha-answer').value = '';
    }
    generateCaptcha();

    document.getElementById('show-register').onclick = () => {
        const block = document.getElementById('register-block');
        block.style.display = block.style.display === 'none' ? 'block' : 'none';
    };

    document.getElementById('register-btn').addEventListener('click', async () => {
        const nick = document.getElementById('reg-nick').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const answer = document.getElementById('captcha-answer').value.trim();
        const nickErr = document.getElementById('reg-nick-error');
        const passErr = document.getElementById('reg-pass-error');
        const captchaErr = document.getElementById('captcha-error');
        nickErr.style.display = 'none';
        passErr.style.display = 'none';
        captchaErr.style.display = 'none';

        if (parseInt(answer) !== captchaNum1 + captchaNum2) {
            captchaErr.style.display = 'block';
            generateCaptcha();
            return;
        }
        if (!nick) { nickErr.textContent = 'Введите ник'; nickErr.style.display = 'block'; return; }
        if (pass.length < 8) { passErr.style.display = 'block'; return; }

        const btn = document.getElementById('register-btn');
        btn.disabled = true;
        btn.textContent = 'Проверка...';

        try {
            const profilesRef = collection(db, "profiles");
            const q = query(profilesRef, where("nickname_lower", "==", nick.toLowerCase()));
            const existing = await getDocs(q);
            if (!existing.empty) {
                nickErr.textContent = 'Ник уже занят';
                nickErr.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Зарегистрироваться';
                generateCaptcha();
                return;
            }
            const email = `user_${nick.toLowerCase()}@rp.local`;
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "profiles", userCred.user.uid), {
                nickname: nick,
                nickname_lower: nick.toLowerCase(),
                email: email,
                createdAt: new Date(),
                role: "user"
            });
        } catch (error) {
            nickErr.textContent = error.message;
            nickErr.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Зарегистрироваться';
            generateCaptcha();
        }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value;
        const nickErr = document.getElementById('nick-error');
        const passErr = document.getElementById('pass-error');
        nickErr.style.display = 'none';
        passErr.style.display = 'none';
        if (!nick) { nickErr.textContent = 'Введите ник'; nickErr.style.display = 'block'; return; }
        if (!pass) { passErr.textContent = 'Введите пароль'; passErr.style.display = 'block'; return; }
        const email = `user_${nick.toLowerCase()}@rp.local`;
        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            const profileRef = doc(db, "profiles", userCred.user.uid);
            const profileSnap = await getDoc(profileRef);
            if (!profileSnap.exists()) {
                await setDoc(profileRef, {
                    nickname: nick,
                    nickname_lower: nick.toLowerCase(),
                    email: email,
                    createdAt: new Date(),
                    role: "user"
                });
            } else {
                await updateDoc(profileRef, { lastSeen: serverTimestamp() });
            }
        } catch (error) {
            if (error.code === 'auth/user-not-found') {
                nickErr.textContent = 'Пользователь не найден. Зарегистрируйтесь.';
                nickErr.style.display = 'block';
            } else if (error.code === 'auth/wrong-password') {
                passErr.style.display = 'block';
            } else {
                nickErr.textContent = error.message;
                nickErr.style.display = 'block';
            }
        }
    });

    let pendingGoogleUser = null;
    document.getElementById('google-login').addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const profileRef = doc(db, "profiles", user.uid);
            const profileSnap = await getDoc(profileRef);
            if (profileSnap.exists()) {
                await updateDoc(profileRef, { lastSeen: serverTimestamp() });
                return;
            }
            pendingGoogleUser = user;
            const modal = document.getElementById('nickname-modal');
            const input = document.getElementById('modal-nick');
            const errorSpan = document.getElementById('modal-error');
            input.value = '';
            errorSpan.style.display = 'none';
            modal.style.display = 'flex';
        } catch (error) {
            alert("Ошибка входа через Google: " + error.message);
        }
    });

    document.getElementById('modal-submit').addEventListener('click', async () => {
        const nickname = document.getElementById('modal-nick').value.trim();
        const errorSpan = document.getElementById('modal-error');
        errorSpan.style.display = 'none';
        if (!nickname) {
            errorSpan.textContent = 'Введите ник';
            errorSpan.style.display = 'block';
            return;
        }
        if (!/^[a-zA-Z0-9_]{3,16}$/.test(nickname)) {
            errorSpan.textContent = 'От 3 до 16 символов (латиница, цифры, _)';
            errorSpan.style.display = 'block';
            return;
        }
        const profilesRef = collection(db, "profiles");
        const q = query(profilesRef, where("nickname_lower", "==", nickname.toLowerCase()));
        const existing = await getDocs(q);
        if (!existing.empty) {
            errorSpan.textContent = 'Этот ник уже занят';
            errorSpan.style.display = 'block';
            return;
        }
        if (!pendingGoogleUser) return;
        await setDoc(doc(db, "profiles", pendingGoogleUser.uid), {
            nickname: nickname,
            nickname_lower: nickname.toLowerCase(),
            email: pendingGoogleUser.email,
            createdAt: new Date(),
            role: "user",
            lastSeen: serverTimestamp()
        });
        document.getElementById('nickname-modal').style.display = 'none';
        pendingGoogleUser = null;
    });

    document.getElementById('modal-cancel').addEventListener('click', async () => {
        if (pendingGoogleUser) await signOut(auth);
        document.getElementById('nickname-modal').style.display = 'none';
        pendingGoogleUser = null;
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const profileRef = doc(db, "profiles", user.uid);
            await updateDoc(profileRef, { lastSeen: serverTimestamp() }).catch(() => {});
            window.location.href = 'server.html';
        }
    });
</script>
</body>
</html>
