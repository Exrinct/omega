<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Server — Вход (отладка)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #b0b0b0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            background: #1c1c1c;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .tabs { display: flex; gap: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid #2c2c2c; padding-bottom: 0.8rem; }
        .tab { font-size: 0.9rem; font-weight: 500; color: #707070; cursor: pointer; padding-bottom: 0.8rem; margin-bottom: -0.8rem; border-bottom: 2px solid transparent; }
        .tab.active { color: #e0e0e0; border-bottom-color: #3b6e4f; }
        .form { display: none; }
        .form.active { display: block; }
        h2 { font-size: 1.6rem; font-weight: 500; color: #e0e0e0; margin-bottom: 1.5rem; }
        .field { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: #909090; margin-bottom: 0.4rem; }
        input {
            width: 100%;
            background: #242424;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            color: #d4d4d4;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: #3b6e4f; box-shadow: 0 0 0 3px rgba(59,110,79,0.15); }
        .error { color: #d9706a; font-size: 0.75rem; margin-top: 0.4rem; display: none; }
        button {
            width: 100%;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.95rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.8rem;
        }
        button:hover { background: #3a6e34; }
        .captcha-block {
            background: #242424;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .captcha-input { width: 70px; padding: 0.5rem; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <div class="tabs">
        <div class="tab active" data-tab="login">Вход</div>
        <div class="tab" data-tab="register">Регистрация</div>
    </div>
    <div class="form active" id="login-form">
        <h2>Войти</h2>
        <div class="field">
            <label for="login-nick">Ник в Minecraft</label>
            <input type="text" id="login-nick" placeholder="Введите ник">
            <div class="error" id="login-nick-error">Пользователь не найден</div>
        </div>
        <div class="field">
            <label for="login-pass">Пароль</label>
            <input type="password" id="login-pass" placeholder="Введите пароль">
            <div class="error" id="login-pass-error">Неверный пароль</div>
        </div>
        <button id="login-btn">Войти</button>
    </div>
    <div class="form" id="register-form">
        <h2>Регистрация</h2>
        <div class="field">
            <label for="reg-nick">Ник в Minecraft</label>
            <input type="text" id="reg-nick" placeholder="Придумайте ник">
            <div class="error" id="reg-nick-error">Ник уже занят</div>
        </div>
        <div class="field">
            <label for="reg-pass">Пароль (мин. 8 символов)</label>
            <input type="password" id="reg-pass" placeholder="Минимум 8 символов">
            <div class="error" id="reg-pass-error">Пароль слишком короткий</div>
        </div>
        <div class="captcha-block">
            <span id="captcha-question"></span>
            <input type="text" class="captcha-input" id="captcha-answer" placeholder="?">
        </div>
        <div class="error" id="captcha-error">Неверный ответ</div>
        <button id="register-btn">Зарегистрироваться</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let captchaNum1, captchaNum2;
    function generateCaptcha() {
        captchaNum1 = Math.floor(Math.random() * 10) + 1;
        captchaNum2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById('captcha-question').textContent = `${captchaNum1} + ${captchaNum2} = ?`;
        document.getElementById('captcha-answer').value = '';
    }
    generateCaptcha();

    // переключение вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.getElementById('login-form').classList.toggle('active', target === 'login');
            document.getElementById('register-form').classList.toggle('active', target === 'register');
        });
    });

    // ВХОД С ОТЛАДКОЙ
    document.getElementById('login-btn').addEventListener('click', async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value;
        const nickErr = document.getElementById('login-nick-error');
        const passErr = document.getElementById('login-pass-error');
        nickErr.style.display = 'none';
        passErr.style.display = 'none';

        if (!nick) { nickErr.textContent = 'Введите ник'; nickErr.style.display = 'block'; return; }

        console.log("🔍 Ищем ник:", nick.toLowerCase());

        try {
            const nickDocRef = doc(db, "nicknames", nick.toLowerCase());
            const nickDocSnap = await getDoc(nickDocRef);
            console.log("📄 Документ nicknames существует?", nickDocSnap.exists());

            if (!nickDocSnap.exists()) {
                nickErr.textContent = 'Пользователь не найден (нет в nicknames)';
                nickErr.style.display = 'block';
                return;
            }

            const ownerUid = nickDocSnap.data().ownerUid;
            console.log("🆔 ownerUid:", ownerUid);

            const profileRef = doc(db, "profiles", ownerUid);
            const profileSnap = await getDoc(profileRef);
            console.log("📄 Профиль существует?", profileSnap.exists());

            if (!profileSnap.exists()) {
                nickErr.textContent = 'Ошибка: профиль не найден';
                nickErr.style.display = 'block';
                return;
            }

            const email = profileSnap.data().email;
            console.log("📧 Email для входа:", email);

            await signInWithEmailAndPassword(auth, email, pass);
            console.log("✅ Вход успешен!");
        } catch (error) {
            console.error("❌ Ошибка входа:", error);
            if (error.code === 'auth/wrong-password') {
                passErr.style.display = 'block';
            } else {
                nickErr.textContent = 'Ошибка: ' + error.message;
                nickErr.style.display = 'block';
            }
        }
    });

    // РЕГИСТРАЦИЯ (без изменений, но оставим)
    document.getElementById('register-btn').addEventListener('click', async () => {
        const nick = document.getElementById('reg-nick').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const answer = document.getElementById('captcha-answer').value.trim();
        const nickErr = document.getElementById('reg-nick-error');
        const passErr = document.getElementById('reg-pass-error');
        const captchaErr = document.getElementById('captcha-error');
        nickErr.style.display = 'none';
        passErr.style.display = 'none';
        captchaErr.style.display = 'none';

        if (parseInt(answer) !== captchaNum1 + captchaNum2) {
            captchaErr.style.display = 'block';
            generateCaptcha();
            return;
        }
        if (!nick) { nickErr.textContent = 'Введите ник'; nickErr.style.display = 'block'; return; }
        if (pass.length < 8) { passErr.style.display = 'block'; return; }

        const btn = document.getElementById('register-btn');
        btn.disabled = true;
        btn.textContent = 'Проверка...';

        try {
            const nickDocRef = doc(db, "nicknames", nick.toLowerCase());
            if ((await getDoc(nickDocRef)).exists()) {
                nickErr.textContent = 'Ник уже занят';
                nickErr.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Зарегистрироваться';
                generateCaptcha();
                return;
            }
            const email = `user_${nick.toLowerCase()}@rp.local`;
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const uid = userCredential.user.uid;
            await setDoc(doc(db, "profiles", uid), { nickname: nick, email, createdAt: new Date() });
            await setDoc(doc(db, "nicknames", nick.toLowerCase()), { ownerUid: uid });
            console.log("✅ Регистрация успешна!");
        } catch (error) {
            nickErr.textContent = 'Ошибка: ' + error.message;
            nickErr.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Зарегистрироваться';
            generateCaptcha();
        }
    });

    onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'server.html'; });
</script>
</body>
</html>
