<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Server — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #b0b0b0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            background: #1c1c1c;
            border: 1px solid #2c2c2c;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .accent { color: #3b6e4f; }
        .google-btn {
            width: 100%;
            background: #2c2c2c;
            border: 1px solid #3b6e4f;
            border-radius: 12px;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: background 0.2s;
            font-family: inherit;
        }
        .google-btn:hover { background: #3b6e4f20; }
        .divider {
            text-align: center;
            font-size: 0.75rem;
            color: #707070;
            margin: 1rem 0;
        }
        .field {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #909090;
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            background: #242424;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            color: #d4d4d4;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: #3b6e4f; }
        .error {
            color: #d9706a;
            font-size: 0.75rem;
            margin-top: 0.4rem;
            display: none;
        }
        button[type="submit"] {
            width: 100%;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }
        button[type="submit"]:hover { background: #3a6e34; }
        .captcha-block {
            background: #242424;
            border-radius: 12px;
            padding: 0.8rem;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>RP Server<span class="accent">.</span></h1>

    <button id="google-login" class="google-btn">🔐 Войти через Google</button>

    <div class="divider">или по паролю</div>

    <div>
        <div class="field">
            <label>Ник в Minecraft</label>
            <input type="text" id="login-nick" placeholder="Введите ник">
            <div class="error" id="nick-error"></div>
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="login-pass" placeholder="Введите пароль">
            <div class="error" id="pass-error"></div>
        </div>
        <button type="submit" id="login-btn">Войти</button>
    </div>

    <div class="divider">Нет аккаунта? <span id="show-register" style="color:#3b6e4f; cursor:pointer;">Зарегистрироваться</span></div>

    <!-- Скрытая форма регистрации -->
    <div id="register-block" style="display:none; margin-top:1.5rem;">
        <div class="field">
            <label>Ник в Minecraft</label>
            <input type="text" id="reg-nick" placeholder="Придумайте ник">
            <div class="error" id="reg-nick-error"></div>
        </div>
        <div class="field">
            <label>Пароль (мин. 8 символов)</label>
            <input type="password" id="reg-pass" placeholder="Минимум 8 символов">
            <div class="error" id="reg-pass-error"></div>
        </div>
        <div class="captcha-block">
            <span id="captcha-question"></span>
            <input type="text" id="captcha-answer" placeholder="?" style="width:60px;">
        </div>
        <div class="error" id="captcha-error"></div>
        <button id="register-btn">Зарегистрироваться</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let captchaNum1, captchaNum2;
    function generateCaptcha() {
        captchaNum1 = Math.floor(Math.random() * 10) + 1;
        captchaNum2 = Math.floor(Math.random() * 10) + 1;
        document.getElementById('captcha-question').textContent = `${captchaNum1} + ${captchaNum2} = ?`;
        document.getElementById('captcha-answer').value = '';
    }
    generateCaptcha();

    // Показать форму регистрации
    document.getElementById('show-register').onclick = () => {
        const block = document.getElementById('register-block');
        block.style.display = block.style.display === 'none' ? 'block' : 'none';
    };

    // ---- Вход по паролю (без изменений) ----
    document.getElementById('login-btn').addEventListener('click', async () => {
        const nick = document.getElementById('login-nick').value.trim();
        const pass = document.getElementById('login-pass').value;
        const nickErr = document.getElementById('nick-error');
        const passErr = document.getElementById('pass-error');
        nickErr.style.display = 'none';
        passErr.style.display = 'none';
        if (!nick) { nickErr.textContent = 'Введите ник'; nickErr.style.display = 'block'; return; }

        try {
            const nickDoc = await getDoc(doc(db, "nicknames", nick.toLowerCase()));
            if (!nickDoc.exists()) { nickErr.textContent = 'Пользователь не найден'; nickErr.style.display = 'block'; return; }
            const uid = nickDoc.data().ownerUid;
            const profile = await getDoc(doc(db, "profiles", uid));
            if (!profile.exists()) { nickErr.textContent = 'Ошибка профиля'; nickErr.style.display = 'block'; return; }
            const email = profile.data().email;
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (err) {
            if (err.code === 'auth/wrong-password') passErr.style.display = 'block';
            else { nickErr.textContent = err.message; nickErr.style.display = 'block'; }
        }
    });

    // ---- Регистрация по паролю ----
    document.getElementById('register-btn').addEventListener('click', async () => {
        const nick = document.getElementById('reg-nick').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const answer = document.getElementById('captcha-answer').value.trim();
        const nickErr = document.getElementById('reg-nick-error');
        const passErr = document.getElementById('reg-pass-error');
        const captchaErr = document.getElementById('captcha-error');
        nickErr.style.display = 'none'; passErr.style.display = 'none'; captchaErr.style.display = 'none';

        if (parseInt(answer) !== captchaNum1 + captchaNum2) { captchaErr.style.display = 'block'; generateCaptcha(); return; }
        if (!nick) { nickErr.textContent = 'Введите ник'; nickErr.style.display = 'block'; return; }
        if (pass.length < 8) { passErr.style.display = 'block'; return; }

        const btn = document.getElementById('register-btn');
        btn.disabled = true; btn.textContent = 'Проверка...';
        try {
            const nickDoc = await getDoc(doc(db, "nicknames", nick.toLowerCase()));
            if (nickDoc.exists()) { nickErr.textContent = 'Ник уже занят'; nickErr.style.display = 'block'; btn.disabled = false; btn.textContent = 'Зарегистрироваться'; generateCaptcha(); return; }
            const email = `user_${nick.toLowerCase()}@rp.local`;
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "profiles", cred.user.uid), { nickname: nick, email, createdAt: new Date() });
            await setDoc(doc(db, "nicknames", nick.toLowerCase()), { ownerUid: cred.user.uid });
        } catch (err) {
            nickErr.textContent = err.message; nickErr.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Зарегистрироваться'; generateCaptcha();
        }
    });

    // ---- Вход через Google ----
    document.getElementById('google-login').addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const email = user.email;
            // Ищем профиль по email в коллекции profiles (поле email)
            const profilesRef = doc(db, "profiles", user.uid);
            const profileSnap = await getDoc(profilesRef);

            if (!profileSnap.exists()) {
                // Первый вход через Google — просим придумать ник
                let nickname = prompt("Придумайте ник в Minecraft (только латиница и цифры, без пробелов)");
                while (!nickname || nickname.trim() === "") {
                    nickname = prompt("Ник не может быть пустым. Придумайте ник:");
                }
                nickname = nickname.trim();
                // Проверка уникальности ника
                const nickDoc = await getDoc(doc(db, "nicknames", nickname.toLowerCase()));
                if (nickDoc.exists()) {
                    alert("Этот ник уже занят. Попробуйте другой.");
                    await signOut(auth);
                    return;
                }
                // Сохраняем профиль
                await setDoc(doc(db, "profiles", user.uid), {
                    nickname: nickname,
                    email: email,
                    createdAt: new Date()
                });
                await setDoc(doc(db, "nicknames", nickname.toLowerCase()), { ownerUid: user.uid });
                alert("Аккаунт создан! Добро пожаловать, " + nickname);
            }
            // Если профиль уже есть — просто пускаем (редирект сделает onAuthStateChanged)
        } catch (error) {
            console.error("Google login error:", error);
            alert("Ошибка входа через Google: " + error.message);
        }
    });

    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = 'server.html';
    });
</script>
</body>
</html>
