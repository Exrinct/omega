<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер привычек</title>
    <!-- Шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #1e1e1e;
            border-radius: 1.5rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: -0.5px;
            color: #f0f0f0;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        #habit-input {
            flex: 1;
            padding: 0.8rem 1rem;
            background-color: #2c2c2c;
            border: 1px solid #3a3a3a;
            border-radius: 0.75rem;
            color: #e0e0e0;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #habit-input:focus {
            outline: none;
            border-color: #6c8cff;
        }

        #add-btn {
            padding: 0.8rem 1.4rem;
            background-color: #6c8cff;
            border: none;
            border-radius: 0.75rem;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: inherit;
        }

        #add-btn:hover {
            background-color: #5a7ae6;
        }

        #add-btn:active {
            transform: scale(0.96);
        }

        #habits-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .habit-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background-color: #2a2a2a;
            padding: 0.9rem 1rem;
            border-radius: 0.75rem;
            transition: background-color 0.2s;
        }

        .habit-item:hover {
            background-color: #323232;
        }

        .habit-checkbox {
            width: 1.3rem;
            height: 1.3rem;
            accent-color: #6c8cff;
            cursor: pointer;
            flex-shrink: 0;
        }

        .habit-text {
            flex: 1;
            font-size: 1.05rem;
            transition: color 0.2s, text-decoration 0.2s;
        }

        .habit-text.done {
            text-decoration: line-through;
            color: #888888;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 0.4rem;
            transition: color 0.2s, background-color 0.2s;
            line-height: 1;
        }

        .delete-btn:hover {
            color: #ff6b6b;
            background-color: #3a3a3a;
        }

        .empty-message {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Привычки</h1>
        <div class="input-group">
            <input type="text" id="habit-input" placeholder="Новая привычка..." autocomplete="off">
            <button id="add-btn">Добавить</button>
        </div>
        <ul id="habits-list"></ul>
    </div>

    <script>
        (function() {
            // Хранилище привычек: массив объектов { id, text, done }
            let habits = [];
            const STORAGE_KEY = 'vibe-habits-tracker';

            // DOM-элементы
            const habitInput = document.getElementById('habit-input');
            const addBtn = document.getElementById('add-btn');
            const habitsList = document.getElementById('habits-list');

            // Загрузка из localStorage
            function loadHabits() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        habits = JSON.parse(stored);
                    } catch (e) {
                        habits = [];
                    }
                } else {
                    // Демо-привычки для первого старта
                    habits = [
                        { id: Date.now() - 2, text: 'Пить воду', done: false },
                        { id: Date.now() - 1, text: 'Читать 10 минут', done: true },
                        { id: Date.now(), text: 'Прогулка', done: false }
                    ];
                }
            }

            // Сохранение в localStorage
            function saveHabits() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
            }

            // Создание HTML-элемента для одной привычки
            function createHabitElement(habit) {
                const li = document.createElement('li');
                li.className = 'habit-item';
                li.dataset.id = habit.id;

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'habit-checkbox';
                checkbox.checked = habit.done;
                checkbox.addEventListener('change', () => toggleHabit(habit.id, checkbox.checked));

                const span = document.createElement('span');
                span.className = 'habit-text' + (habit.done ? ' done' : '');
                span.textContent = habit.text;

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '×';
                delBtn.title = 'Удалить привычку';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteHabit(habit.id);
                });

                li.appendChild(checkbox);
                li.appendChild(span);
                li.appendChild(delBtn);

                return li;
            }

            // Полная перерисовка списка
            function renderHabits() {
                habitsList.innerHTML = '';

                if (habits.length === 0) {
                    const emptyMsg = document.createElement('li');
                    emptyMsg.className = 'empty-message';
                    emptyMsg.textContent = 'Пока нет привычек. Добавьте первую!';
                    habitsList.appendChild(emptyMsg);
                    return;
                }

                habits.forEach(habit => {
                    habitsList.appendChild(createHabitElement(habit));
                });
            }

            // Добавление новой привычки
            function addHabit(text) {
                const trimmed = text.trim();
                if (trimmed === '') return;

                const newHabit = {
                    id: Date.now(),
                    text: trimmed,
                    done: false
                };
                habits.push(newHabit);
                saveHabits();
                renderHabits();
            }

            // Переключение состояния (done/undone)
            function toggleHabit(id, isDone) {
                const habit = habits.find(h => h.id === id);
                if (habit) {
                    habit.done = isDone;
                    saveHabits();
                    // Можно было бы просто обновить класс, но проще перерисовать
                    renderHabits();
                }
            }

            // Удаление привычки
            function deleteHabit(id) {
                habits = habits.filter(h => h.id !== id);
                saveHabits();
                renderHabits();
            }

            // Обработчики событий
            function bindEvents() {
                addBtn.addEventListener('click', () => {
                    addHabit(habitInput.value);
                    habitInput.value = '';
                    habitInput.focus();
                });

                habitInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        addHabit(habitInput.value);
                        habitInput.value = '';
                    }
                });
            }

            // Инициализация
            function init() {
                loadHabits();
                renderHabits();
                bindEvents();
            }

            init();
        })();
    </script>
</body>
</html>
