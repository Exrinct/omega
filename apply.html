<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>В команду — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg:#141618; --surface:#1c1e21; --surface-2:#222528; --surface-3:#2a2d31;
            --border:rgba(255,255,255,0.07); --border-mid:rgba(255,255,255,0.11); --border-hi:rgba(255,255,255,0.18);
            --accent:#4ade80; --accent-dim:#22c55e; --accent-mute:rgba(74,222,128,0.10);
            --text:#f0f0f0; --text-2:#9ca3af; --text-3:#4b5563;
            --red:#f87171; --radius:14px; --radius-lg:20px; --ease-out:cubic-bezier(.16,1,.3,1);
        }
        body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
        .navbar { background:rgba(20,22,24,.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:.75rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
        .brand-logo { display:flex; align-items:center; gap:.55rem; text-decoration:none; }
        .brand-mark { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent-dim)); border-radius:8px; display:flex; align-items:center; justify-content:center; }
        .brand-mark svg { width:15px; height:15px; fill:#0f1011; }
        .brand-name { font-family:'DM Serif Display',Georgia,serif; font-size:1.15rem; color:var(--text); }
        .back-link { color:var(--text-2); text-decoration:none; font-size:.85rem; transition:color .15s; }
        .back-link:hover { color:var(--text); }
        .container { max-width:680px; margin:2.5rem auto; padding:0 1.5rem; }
        .page-header { margin-bottom:2rem; }
        .page-header h1 { font-family:'DM Serif Display',Georgia,serif; font-size:2rem; font-weight:400; letter-spacing:-.02em; color:var(--text); margin-bottom:.4rem; }
        .page-header p { font-size:.88rem; color:var(--text-2); font-weight:300; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem; margin-bottom:1.2rem; }
        .roles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.6rem; margin-bottom:1.5rem; }
        .role-chip { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:.6rem .9rem; font-size:.78rem; color:var(--text-2); display:flex; align-items:center; gap:.5rem; }
        .role-chip span { font-size:.9rem; }
        .field { margin-bottom:1.3rem; }
        label { display:block; font-size:.8rem; font-weight:500; color:var(--text-2); margin-bottom:.45rem; }
        input, select, textarea {
            width:100%; background:var(--surface-2); border:1px solid var(--border-mid);
            border-radius:var(--radius); padding:.75rem 1rem;
            font-family:'DM Sans',sans-serif; font-size:.9rem; color:var(--text);
            outline:none; transition:border-color .18s,background .18s,box-shadow .18s; -webkit-appearance:none;
        }
        input::placeholder, textarea::placeholder { color:var(--text-3); }
        input:focus, textarea:focus { border-color:rgba(74,222,128,.45); background:var(--surface-3); box-shadow:0 0 0 3px var(--accent-mute); }
        textarea { resize:vertical; }
        .info-block { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.2rem; margin:1.2rem 0; display:flex; gap:.8rem; }
        .info-block p { font-size:.8rem; color:var(--text-2); line-height:1.6; }
        .btn-primary { width:100%; background:var(--accent); border:none; border-radius:var(--radius); padding:.85rem; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:600; color:#0f1011; cursor:pointer; transition:background .18s,transform .15s,box-shadow .18s; box-shadow:0 4px 16px rgba(74,222,128,.22); margin-top:.5rem; }
        .btn-primary:hover { background:#6bef96; transform:translateY(-1px); box-shadow:0 6px 24px rgba(74,222,128,.32); }
        .btn-primary:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
        .submit-error { color:var(--red); font-size:.8rem; margin-top:.8rem; text-align:center; }
        .version { position:fixed; bottom:1rem; right:1.2rem; font-size:.68rem; color:var(--text-3); z-index:100; }
        @media(max-width:640px) { .container{padding:0 1rem;} .card{padding:1.4rem;} }
    </style>
</head>
<body>
<div class="version">v4.0.0</div>
<nav class="navbar">
    <a href="server.html" class="brand-logo">
        <div class="brand-mark"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.8 1.56 5.24 3.87 6.54L8 20h2.5v-1c0-.55.45-1 1-1h1c.55 0 1 .45 1 1v1H16l-.87-4.46C17.44 14.24 19 11.8 19 9c0-3.87-3.13-7-7-7z"/></svg></div>
        <span class="brand-name">Omega</span>
    </a>
    <a href="server.html" class="back-link">← Назад</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Вступить в команду</h1>
        <p>Заполните анкету — мы свяжемся с вами в Discord</p>
    </div>

    <div class="card">
        <div style="font-size:.8rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.8rem;">Открытые направления</div>
        <div class="roles-grid">
            <div class="role-chip"><span>🛡</span> Модератор</div>
            <div class="role-chip"><span>⚙️</span> Разработка</div>
            <div class="role-chip"><span>🎨</span> Дизайн</div>
            <div class="role-chip"><span>📋</span> Организация RP</div>
            <div class="role-chip"><span>📝</span> Контент</div>
            <div class="role-chip"><span>🔧</span> Администратор</div>
        </div>
    </div>

    <div class="card">
        <div class="field">
            <label>Discord username</label>
            <input type="text" id="discord" placeholder="user#1234 или просто user">
        </div>
        <div class="field">
            <label>Как к вам обращаться</label>
            <input type="text" id="realname" placeholder="Ваше имя">
        </div>
        <div class="field">
            <label>Возраст <span style="color:var(--text-3);font-size:.75rem;">— от 16 лет</span></label>
            <input type="number" id="age" placeholder="Ваш возраст">
        </div>
        <div class="field">
            <label>Навыки и опыт</label>
            <textarea id="skills" rows="4" placeholder="Опишите что умеете: Minecraft, администрирование, модерация, дизайн, кодинг, организация RP…"></textarea>
        </div>
        <div class="field">
            <label>Мотивация</label>
            <textarea id="motivation" rows="3" placeholder="Почему хотите в команду?"></textarea>
        </div>

        <div class="info-block">
            <p>Заявки рассматриваются администрацией. После одобрения вы получите уведомление на сайте.</p>
        </div>

        <button id="submit-btn" class="btn-primary">Отправить заявку</button>
        <div id="submit-error" class="submit-error"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig={apiKey:"AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",authDomain:"omega-5de05.firebaseapp.com",projectId:"omega-5de05",storageBucket:"omega-5de05.firebasestorage.app",messagingSenderId:"438319801454",appId:"1:438319801454:web:775924ab8ef4417760b27f"};
    const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
    document.getElementById('submit-btn').addEventListener('click',async()=>{
        const err=document.getElementById('submit-error');err.textContent='';
        const user=auth.currentUser;if(!user){err.textContent='Вы не авторизованы.';return;}
        const discord=document.getElementById('discord').value.trim(),realname=document.getElementById('realname').value.trim(),age=parseInt(document.getElementById('age').value),skills=document.getElementById('skills').value.trim(),motivation=document.getElementById('motivation').value.trim();
        if(!discord||!realname||!age||!skills||!motivation){err.textContent='Заполните все поля.';return;}
        if(isNaN(age)||age<16){err.textContent='Возраст должен быть от 16 лет.';return;}
        const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Отправка…';
        try{const ps=await getDoc(doc(db,"profiles",user.uid));const uNick=ps.exists()?ps.data().nickname:"Неизвестно";await addDoc(collection(db,"team_applications"),{userId:user.uid,userNick:uNick,discord,realName:realname,age,skills,motivation,status:'pending',createdAt:serverTimestamp()});alert('Заявка отправлена. С вами свяжутся в Discord.');window.location.href='server.html';}
        catch(e){err.textContent='Ошибка: '+e.message;btn.disabled=false;btn.textContent='Отправить заявку';}
    });
    onAuthStateChanged(auth,(user)=>{if(!user)window.location.href='index.html';});
</script>
</body>
</html>
