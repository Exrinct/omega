<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание персонажа — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            color: #3b6e4f;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 8px;
        }
        .card {
            background: #121212;
            border: 1px solid #2c2c2c;
            border-radius: 28px;
            padding: 2.5rem 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 2rem; font-weight: 500; margin-bottom: 1rem; }
        .accent { color: #3b6e4f; }
        p { line-height: 1.6; margin: 1.5rem 0; color: #bbb; }
        .btn {
            display: inline-block;
            background: #2d5a27;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            padding: 0.9rem 2rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }
        .btn:hover { background: #3a6e34; }
        .back-link {
            color: #909090;
            text-decoration: none;
            border: 1px solid #3b6e4f;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
        }
        .back-link:hover { background: #3b6e4f20; }
    </style>
</head>
<body>
<div class="version">v1.0.0</div>
<div class="card">
    <h1>Анкета персонажа<span class="accent">.</span></h1>
    <p>Заполните Google-форму, чтобы создать историю вашего героя.</p>
    <a href="https://forms.gle/C9xFskgkDuPWiNMW6" target="_blank" class="btn">Заполнить анкету</a>
    <br>
    <a href="server.html" class="back-link">Назад в панель</a>
</div>
</body>
</html>
