<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Магазин — Omega RolePlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0A0A0A;
            color: #E6E6E6;
            padding: 1rem;
        }
        .version {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 0.65rem;
            color: #3B6E4F;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
            z-index: 100;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.2rem;
            color: #3B6E4F;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .balance {
            background: #111;
            border: 1px solid #222;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .item-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 1rem;
            transition: 0.2s;
        }
        .item-card:hover {
            border-color: #3B6E4F;
        }
        .item-name {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .item-desc {
            font-size: 0.75rem;
            color: #A0A0A0;
            margin-bottom: 0.8rem;
        }
        .item-price {
            font-weight: 500;
            color: #FFD966;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            background: #3B6E4F;
            border: none;
            border-radius: 40px;
            padding: 0.5rem;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #3B6E4F;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 100;
            display: none;
        }
        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="version">v3.1.0</div>
<div class="container">
    <a href="server.html" class="back-link">← Назад</a>
    <div class="balance">💰 <span id="user-points">0</span> монет</div>
    <div id="shop-items" class="grid">Загрузка...</div>
</div>
<div id="message" class="message"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlJZW0my5-k5b2sINpsAfg-u43AyV1Dlo",
        authDomain: "omega-5de05.firebaseapp.com",
        projectId: "omega-5de05",
        storageBucket: "omega-5de05.firebasestorage.app",
        messagingSenderId: "438319801454",
        appId: "1:438319801454:web:775924ab8ef4417760b27f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    async function loadBalance() {
        if (!currentUser) return;
        const profile = await getDoc(doc(db, "profiles", currentUser.uid));
        const points = profile.exists() ? (profile.data().rp_points || 0) : 0;
        document.getElementById('user-points').innerText = points;
    }

    async function loadShop() {
        const snap = await getDocs(collection(db, "shop_items"));
        const container = document.getElementById('shop-items');
        if (snap.empty) {
            container.innerHTML = '<div class="item-card">Товаров пока нет</div>';
            return;
        }
        container.innerHTML = '';
        for (const docSnap of snap.docs) {
            const item = docSnap.data();
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div class="item-name">${escapeHtml(item.name)}</div>
                <div class="item-desc">${escapeHtml(item.description)}</div>
                <div class="item-price">💰 ${item.price} монет</div>
                <button class="buy-btn" data-id="${docSnap.id}" data-price="${item.price}">Купить</button>
            `;
            container.appendChild(div);
        }
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const itemId = btn.getAttribute('data-id');
                const price = parseInt(btn.getAttribute('data-price'));
                const profileRef = doc(db, "profiles", currentUser.uid);
                const profile = await getDoc(profileRef);
                const points = profile.data().rp_points || 0;
                if (points < price) {
                    showMessage('Недостаточно монет');
                    return;
                }
                await updateDoc(profileRef, { rp_points: increment(-price) });
                await addDoc(collection(db, "purchases"), {
                    userId: currentUser.uid, itemId, purchasedAt: serverTimestamp(), used: false
                });
                showMessage(`Куплено: ${item.name}`);
                loadBalance();
            });
        });
    }

    function showMessage(text) {
        const msg = document.getElementById('message');
        msg.innerText = text;
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    }
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        loadBalance();
        loadShop();
    });
</script>
</body>
</html>
